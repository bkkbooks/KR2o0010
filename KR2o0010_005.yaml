body:
  text: 六朝通鑑博議卷五宋李燾撰桓沖伐秦無功而還寧康三年桓沖自求出外詔以車騎將軍都督豫江二州之六郡軍自京口遷鎮姑孰既而苻堅冦涼州沖遣宣城內史朱序豫州刺史桓伊率衆向壽陽淮陽太守劉波泛舟淮泗乘虛致討以救涼乃表曰氐賊自并東胡類實繁而蜀漢寡弱西涼無備臣雖凡庸識乏武略然猥荷重任思在投袂請率所統徑進南郡與西將軍臣豁參同謀猷賊若果驅犬羊送死沔漢庶仰慿正順因致人利一舉乘風掃清氛穢詔答醜類違天比年縱肆詢于羣后敬從高算㑹張天鍚陷沒於是罷兵俄而豁卒遷都督江荆梁益寧交廣七州沖既到江陵時苻堅强盛沖欲移阻江南上疏移鎮上明堅遣其將苻融冦礬口鄧召越冦魯陽姚襄冦南鄉韋鍾冦魏興所在陷沒沖遣江夏相劉奭南中郎將朱序擊之而奭畏懦不進序又為賊所擒沖深咎責上疏送章節請解職不許堅遣慕容垂毛當冦鄧城苻熙石越冦新野沖既憚堅衆又以疾疫還鎮上明臣燾曰攻夷狄者不攻其盛而攻其衰其盛也養天下之力以待之其衰也竭天下之力以趨之桓沖之用兵蓋反乎此攻苻堅於方盛不知待其衰而後攻此其所以無成也堅以百勝之威垂涎南方去歲之冬㑹羣臣大議將為今秋南侵之計豈可以兵而輕犯之哉沖膺晉朝方面之寄據兵上流聞北人之為是議也因益財訓兵養其力以為本朝緩急之俟堅有淝水之敗則掃荆楚之衆與謝安合而乘其弊苻堅腹背受敵其能支乎顧沖輕而無謀何足以語此謝𤣥破苻堅於淝水太元三年十月秦王堅㑹羣臣于太極殿議曰東南一隅未霑王化今略計吾士卒可得九十七萬吾欲自將以討之何如朱彤曰陛下恭行天罰必有征無戰晉王不銜璧軍門則走死江海堅喜曰是吾志也左僕射權翼曰晉雖微弱未有大惡謝安桓沖皆江表偉人君臣輯睦未可圖也堅默然所幸張夫人諫曰衆雞夜鳴羣犬哀嘷廄馬多驚武庫兵器自動有聲此皆非出師之祥也堅曰軍旅之事非婦人所當預也八年七月下詔大舉入冦甲子堅發長安戎卒六十餘萬騎二十七萬旗鼓相望前後千里是時秦兵既盛都下震恐十月秦陽平公融等攻壽陽克之秦將軍梁成等帥衆五萬屯于洛澗柵淮以遏東兵謝石謝𤣥等去洛澗二十五里而軍惲成不敢進秦王堅遣朱序來說石等以强弱異勢不如速降序私謂石等曰若秦百萬之衆盡至誠難與敵今乘諸軍未集宜速擊之若敗其前鋒則彼已奪氣可遂破也石從序言十一月謝𤣥遣劉牢之帥精兵五千趨洛澗未至十里梁成阻澗為陳以待之牢之直前渡之擊成大破之斬成又分兵斷其歸津秦步騎崩潰爭赴淮水士卒死者萬五千人執秦揚州刺史王顯等於是謝石等諸軍水陸繼進堅與融登壽陽城望之見晉兵部陳嚴整又望見八公山草木皆以為晉兵顧謂融曰此亦勍敵何謂弱也憮然有懼色秦兵逼淝水而陳晉兵不得渡𤣥遣使謂融曰君垂軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳小却使晉兵得渡以決勝負不亦善乎融以為然遂麾兵使却秦兵遂退不可復止謝𤣥謝琰桓伊等引兵渡水及之融馳騎略陳欲以帥退者馬倒為晉兵所殺秦兵遂潰𤣥等乘勝追擊至于青岡秦兵大敗自相蹈藉而死者蔽野塞川走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息草行露宿重以饑凍死者什七八初秦兵小却朱序在陳後呼曰秦兵敗矣衆遂大奔序因與張天鍚皆來奔獲秦王堅所乘雲母車及儀服器械軍資珍寶不可勝計謝安得驛書知秦兵已敗時方與客圍棊攝書置牀上了無喜色圍棊如故客問之徐答曰小兒輩遂已破賊丁亥石等歸建康臣燾曰智者不獨知人亦必有以知天蓋人可以力取可以智勝而智謀衆力所不能違者天而已况禮樂之地正朔所在天意眷佑不可與爭苻堅恃區區之衆欲以勝天其愚甚矣智如信勇如布威如莽天所不與終膏斧鉞况下於此者乎故王猛苻融丁寧為堅言之彼蓋知此者矣謝安圍棊對捷書見前段臣燾曰兵畏敵者敗輕敵者勝畏敵則其氣怯輕敵則其氣勇勇怯之氣萌則勝負之形判矣晉自劉石首亂中原之人向之者破以桓溫之雄三敗於狄况餘人乎苻堅以百萬之衆坐瞰吳江江左之人畏之如虎倉皇失色是士已怯矣以謝幼度之雅量而忘故步失本心是將已怯矣師未見敵將士皆怯為之謀主又無以鎮之則上下失據恐勝負之決不待兩軍之交而後見矣故謝安石鎮之以安謀之以靜其始也遊厯山川示之以不足畏其終也對客圍棊示之以不足喜所以激來人之心而使之不懼使江左之人知五胡之么麼不足芥蒂則始可用矣此安石之深謀也謝𤣥欲自屯彭城朝議以征役既久令𤣥置戍而還十一年𤣥欲令豫州刺史朱序鎮梁國𤣥住彭城北固河上西援洛陽內藩朝廷朝議以征役既久宜置戍而還使𤣥還鎮淮陰序鎮壽陽臣燾曰治身者先治其心心治而神正神正則手足可運耳目可使而動作視聽各得其所故人之治身先治其心智者之治國先治其本彭城之在晉晉之本也固守彭城則伸縮進退可以自安而晉氏君臣沮怯不過棄其本而守其末姦逆乘之遂其顛沛惜夫謝安乘苻氏之亂經略中原九年八月太保安奏請乘苻氏傾敗開拓中原以徐兖二州刺史謝𤣥為前鋒都督帥豫州刺史桓石䖍等伐秦𤣥至下邳秦徐州刺史趙遷棄彭城走𤣥進據彭城九月彭城內史劉牢之進據鄄城河南城堡皆來歸附安上疏自求北征詔安都督揚江等十五州諸軍事十二月燕王垂以秦長樂公丕猶據鄴不去乃更引兵圍鄴丕懼遣參軍焦達請救於𤣥𤣥乃遣劉牢之帥衆二萬救鄴丕告饑𤣥水陸運米二千斛以饋之臣燾曰兵速則氣鋭鋭則敢於戰久則氣怠怠則憚於戰善用者則敢不善者則沮五胡亂晉江南之人時出而攻之敗亡相繼鋭氣勇心銷耗殆盡幸而天祐中華苻秦自提百萬之衆投之淝水見草木之形狀足以變秦王之色聞風鶴之聲唳足以破秦人之膽當此之時晉人惟欲進秦人惟欲退此破竹之勢乘之不可失矣而晉之君臣方且從容退避謝安則欲量移旋斾謝𤣥則欲出粟和冦劉牢之䇿馬過澗自沮其氣以失此機使司馬氏不克見中原之復而五胡之罪終世不討悲夫劉裕平廣固擒慕容超安帝隆安五年六月劉裕至東莞南燕主超遣公孫五樓段暉等將步騎五萬屯臨朐裕與燕兵戰於臨朐日向昃勝負未決裕遣胡蕃及向彌潛師出燕兵之後攻臨胊聲言輕兵自海至矣向彌擐甲先登遂克之超大驚單騎就段暉於城南裕因縱兵奮擊燕衆大敗超遁廣陵裕乘勝逐北至廣固丙子克其大城超收衆入保小城裕築長城圍守之義熙六年二月公孫五樓為地道出擊晉兵不能却丁亥裕悉衆攻城四靣急攻之尚書恱壽開門納晉師超與左右數十騎踰城突圍出走裕迫獲之數以不降之罪超神色自若一無所言惟以母託劉敬宣而已送超詣建康斬之桓𤣥之亂敬宣嘗奔南燕後復歸晉臣燾曰管子曰攻堅則瑕者堅攻瑕則堅者瑕蓋以堅攻堅不能相折以瑕攻瑕不能相困不若以吾之有餘攻彼之不足則往無不利矣故秦常先攻韓漢先攻魏唐先攻薛仁杲使强侯大國以為吾之所攻者止於如此益以懈怠而吾得以益為富若管子可謂知兵若秦漢與唐可謂善兵東晉之末慕容氏有三齊之地而不能用侮而取之此其時矣况三齊之國五家之良可以强兵魚鹽之利可以富國若乘其昏裂其地取其兵外足以怠秦魏內足以益吾之力如宋武可謂知所攻矣劉裕既平姚泓欲留長安經略西北聞劉穆之卒遂還十三年七月裕至陜沈田子傅𢎞之入武關秦戍將皆委城走秦主泓使給事姚和都屯嶢柳以拒之田子撫慰士卒皆踊躍鼓譟執短兵奮擊秦兵大敗泓奔灞上辛丑裕至潼關王鎮惡請帥水軍自河入渭以趨長安裕許之乃身先士卒衆騰踊爭進大破姚丕於渭橋泓兵不戰而潰癸亥泓將妻子群臣詣鎮惡軍門請降鎮惡以屬吏十一月裕始欲留長安經略西北而諸將皆久役思歸多不欲留㑹穆之卒以報本無託遂決意東還臣燾曰天下之勢通則安離則危蜀之與洛據天下之要害而有所以通之者其勢在秦晉氏自元海首禍天壤奧區淪為異域元帝獨得江左之地以續宗祖百年之間有志之士經略西北不為無人亦嘗一得蜀三得洛而洛不能守者以無秦也逮宋武之起得蜀得齊得洛繼而得秦此天之所以福中國而成其混一之㑹武帝若能安守關中鎮撫餘民出其豪傑與之共守中保洛陽內藩朝廷外連氐羌以固巴蜀使吳得生養休息於其內以供軍用荆兖豫亦得以借秦之重而固守其所首臂肘足迭相為用則雖關東隴北之版圖未盡歸於司空而天下大勢亦已定矣奈何席不暇暖舉千里之秦付之乳褓之兒兵未釋甲秦地已為它人有秦亡而洛次之秦洛既去吳蜀之藩籬遂寒矣其後雖發江淮之衆出青齊之甲倚荆蜀之援以爭天下而終不能與北抗者以其勢分而不能相為用也故英豪之人欲有事於天下宜先事秦劉裕東還留其子義真守長安私命沈田子殺王鎮惡自是諸將不和裕以次子桂陽公義真為都督雍梁秦三州諸軍事領雍東秦二州刺史義真時年十二以王修為長史王鎮惡為司馬沈田子為中兵參軍傅𢎞之為雍州治中從事史裕之克長安王鎮惡功為多由是南人皆惡之沈田子以嶢栁之捷與鎮惡爭功不平裕將還田子及傅𢎞之屢言於裕裕曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳十四年正月夏赫連璝至渭關中田子與鎮惡素有相圖之志俱出此地以拒夏兵軍中訛言鎮惡欲據關中反於是田子請鎮惡至傅𢎞之營計事田子求屏人語使其宗人沈敬斬之奔告劉義真義真與王修被甲登橫門以察其變俄而田子來至言鎮惡反修執田子數以專戮斬之𢎞之大破赫連璝臣燾曰智者能使才不智者則害之天下之才其不相下久矣能均則相忌勢均則相厄區處條别各盡其用使不相害者主之能也故冦恂賈復之所以能佐漢者以光武能使之楊儀魏延之所以能佐蜀者以武侯能使之能使之則天下無廢才不能使之以至於迭相忌厄禍端既開又從而誅戮則其所以用之者乃所以害之爾宋氏以新造之業折衝禦侮如王修王鎮惡沈田子者凡有幾人繩之以禮法諭之以忠義使同心一力以衛社稷尚有乏才之嘆而况生其忌心開其禍門鬭之使爭聚而殲之不亦悲夫故宋之不復北伐非無兵也無將也爪牙股肱之將盡於伐秦之舉矣而欲與人鬭得乎哉赫連勃勃入長安長安不守閏月夏主勃勃聞裕東還大喜問於王買德買德曰關中形勢之地而裕以幼子守之狼狽而歸此天以關中賜我不可失也勃勃乃帥其子璝帥騎二萬向長安勃勃自將大軍為後繼十月勃勃進據咸陽十一月朱齡石至長安義真將士貪縱大掠而東夏赫連璝率衆追義真傅𢎞之繼後力戰連日至青泥晉兵大敗𢎞為王買德所擒義真行在前㑹日暮夏兵不窮追得免臣燾曰凡兵之道難成者勢易失者機方其將竭謀士竭勇轉戰求勝以成其不敵之勢豈一日之蓄哉而機㑹之間一有不謹以敗其勢於垂成特跬步之轉耳故古之人於此焉常謹之晉自五胡亂華中國之人厲劒槊躡弓矢盡精畢慮以復其大恥不為一人代陂之役王龕不返山桑之戰殷浩不復位枋頭之師桓溫不振旅皆中國之恥中國之人遂以戰鬭擊搏惟夷狄能之而不敢與爭方是時勢在五胡而中國之所不可敵庾氏弟兄謝氏父子選將士修器械厚積財鍛煉激發數十年之後而始有可用者宋武滅慕容三齊克譙縱於庸蜀殄盧循於交廣西執姚泓而定關中兵聲一振天下憚服當此之時中國之勢幾定矣五胡餘種惟關東之拓跋隴北之赫連爾晉師之入關縮頸却立不敢出氣君臣聚議惟伺其轉足而圖之此機也固當審處而徐圖之耳奈何武帝舉金城之地付之無知之孩引兵遽還不復顧慮使赫連氏之接踵而取之失地亡將不能復出重消中國之氣益成夷狄之勢百年為之一旦敗之不亦惜夫昔者秦自穆公常雄諸侯爭割地以奉秦秦未嘗一日忘諸侯之憂無歲不用其師誠以其勢不可以弱也故古之人不慮於未成未成則危危則人奮不慮於已成已成則安安則勢定為將成之㑹安危之機智者之所嘗慮而武帝忽之惜夫六朝通鑑博議卷五
