body:
  text: 六朝通鑑博議卷九宋李燾撰作淮堰十三年二月魏降人王足陳計求堰淮水以灌壽陽上以為然使水工陳承伯材官將軍祖暅視地形咸謂淮内沙土漂輕不堅實功不可就上弗聽發徐揚民率二十户取五丁以築之假太子右衛率康絢都督淮上諸軍事并護堰作於鍾離役人及戰士合二十萬南起浮山北扺巉石依岸築土合脊於中流十四年夏四月浮山堰成而復潰或言蛟龍能乘風破堰其性惡鐵乃運東西冶鐵數千萬斤沈之亦不能合乃伐木為井幹填以巨石加土其上緣淮百里内木無巨細皆盡負擔者肩上皆穿夏日疾疫死者相枕蠅蟲晝夜聲合十五年四月堰成九月堰壞其聲如雷聞三百里臣燾曰天下有大利聖人不輕為非惡利也以其所害有大於所利爾河之勢天造地設自神禹不能回特因其勢以導之况下於禹者乎故孝武之時嘗事匈奴而齊人之計欲回河水注北中可使終漢之世無北顧之憂非利不大也而武帝不受以為區區之力豈能與天地爭未必有功徒自耗爾南北之時魏梁相持壽春在魏梁人欲之不患無隙而輕信弗詢之謀重營難成之事求堰淮水以灌壽春立計新奇造端宏大恃其區區之衆欲與淮爭勢與天地爭力自勞其民決無所就不待智者而後知借使梁人用堰淮之衆以戰何戰不勝用堰淮之財以食何食不足養財蓄力以乘敵釁壽春固在其掌股中矣不知何苦而為此計也魏元法僧以彭城來降尋復失之六年正月魏徐州刺史元法僧素附元义見义驕恣恐禍及已遂謀反魏遣中書舍人張文伯至彭城法僧謂曰吾欲與汝去危就安能從我乎文伯曰我寧死見文陵松柏安能去忠義而從叛逆乎法僧殺之又殺行臺高諒稱帝改元天啓乃使臨淮王彧為都督以討彭城三月上命豫章王綜權頓彭城總督衆軍法僧驅彭城吏民萬餘人南渡法僧至建康上寵待甚厚初帝納東昏侯寵姬吳淑媛七月而生豫章王綜宫中多疑及淑媛寵衰怨望密以告綜相抱而泣綜由是自疑常懷異志及在彭城魏安豐王延明臨淮王彧將兵二萬逼彭城勝負久未決上慮綜敗没勅綜引軍還綜恐南歸不復得至北邊乃密遣人送降款於彧六月綜夜出步投彧軍及旦齋内諸閣猶閉不開城中求王不獲軍退大潰魏人入彭城乘勝追擊梁兵復取諸城臣燾曰自孫氏建國以迄於陳凡傳六代而所守不過三門欲進則守河欲固則守江處攻守之中圖進退之全則守淮蓋守江則已蹙守河則已逺蹙國而守非勇者不能逺國而守非强者不能孫氏臣主俱豪兵鋒所向迎之者破故能畫長江而守之魏人不敢南向其後宿將舊臣彫落繼盡而其孫用之則危矣劉氏將卒俱精威震天下力傾五胡能分命虎臣列守河南拓跋赫連不敢顧眄而其子効之則敗矣故惟勇者為能守近惟强者為能坐逺如其未能莫若擇利害之中守兩淮之地據地險待天時天下無釁則淮南可以蔽江南淮北可以通青齊天下有變則分命大將將淮北之衆可以出冀岱搖青冀發淮南之師可以襲許洛取梁宋近固國本逺申主威此實攻守之基不可不固而兩淮之地南北餘千里分兵而守則力不足發兵而守則内可憂故欲守兩淮莫若守其本淮北之本在彭城淮南之本在壽陽若顧二鎮聚兵甲蓄財貨大佃積穀守以良將以勢臨敵敵人則終不敢越彭城以謀淮南越壽春以驚江揚兩淮安則建康可以奠居故高城深池不必皆守廣土衆民不必皆攻善攻者攻其根善守者守其門攻而拔其根則枝葉不待搖而落守而扼其門則堂奥不待據而安南劉以來常守一城以奠兩淮佛狸雖以回山倒海之力孝文雖以吹唇沸地之威南臨瓜步西向荆襄南來之勢意若無吳而回轅之日不能有吳之一民豈非敵之根本初未有差雖得其四支長淮限其外大鎮逼其内夏水忽盛津道無由聚兵積糧適為敵餌故魏人不敢輕顯初欲輕棄彭城逺營青冀而尉元以為憂孝文欲過彭城戍淮南而高閭以為憂元英欲越淮外取鍾離而邢巒以為憂此北人之所深忌而南人之所當守而梁武得之不甚重失之不甚惜任其去來不復顧念撥根本而欲長存得乎哉夏侯亶等攻壽陽李憲以壽陽降七年正月上聞淮堰水盛壽陽城幾没復遣豫州刺史夏侯亶等攻壽陽十一月亶等軍入魏境所向皆下魏揚州刺史李憲以壽陽降陳慶之入據其城凡降城五十二獲男女七萬五千口臣燾曰梁之失計未有如失壽陽之謬也江左自薛安都之變而失彭城常珍奇之變而失垂瓠慕容白曜之攻而失三齊魏孝文之攻而失五都元英之攻而失義陽四垂藩籬開徹殆盡而不足為建康危者壽陽存焉耳壽春者淮南之根本淮北旣去則淮南當守淮南欲守則壽春在所先圖譬之常人之家必有堂奥之居收貨財聚子弟以壯一室之望四隅之地雖有傾敗而堂奥之勢不可不壯壽春在當時江淮之堂奥也南引汝潁之利東連三江之富北接梁宋西通陳許五湖之阻可以扞外淮淝之固可以蔽内壤土富饒兵甲堅利壽陽安則淮北有收復之望河南有平蕩之期壽陽一去畫江為守使敵在吾耳目之前伺吾轉盻之隙則江揚荆襄其勢孤矣故壽陽在敵則吾憂在我則敵懼我得亦利彼得亦利此兩家之所必爭孫曹之敵壽陽在北南人爭之兵不虚舉母丘諸葛繼為叛亂吳國因之以謀壽陽司馬兄弟親冒矢石不敢徐行孫氏祖孫經營三世卒不能有而國并于晉者以壽陽在晉羊祜杜預得扼吳人之吭而蹈其胷背於肘股之下也晉自五馬渡江開國一隅而壽陽得失常為之休戚祖約入于此而庾亮不得安居袁直入于此而桓温不得奠枕石勒苻堅皆困于此而不得進自宋以來宗室繼守繕甲聚兵惟恐其闕索虜垂涎江南為日久矣恫疑虚喝而不敢前淮南之兵有以虞其後爾奈何蕭齊之季孱主不君孽臣外叛以壽陽入于魏而魏人政亂得不能用復輸之梁豈非正朔所在上天眷佑故要害之地不使在敵梁旣得之可以為恢復之漸不可復失矣昔者周有朔方之城而詩人歌之魯有寶玉之得而春秋書之壽陽要害豈不重於僻逺之朔方無用之寶玉哉梁之君臣不知愛重以與侯景不甚顧惜使景因此以墟江陽一亂不復而江南之勢遂去者以壽陽先也故曰梁之失計未有如壽陽之謬也陳慶之送北海王顥還北大通二年冬十月丁亥帝以魏北海王顥為魏王遣東宫直閣將軍陳慶之將兵送之還北臣燾曰君子不能為機亦不能失機先機而為則為妄動臨時而失則為無功機㑹之來不可不察昔者晉文之伺楚反國三年楚人出師遽起而乘之一戰勝楚遂伯諸侯越踐之伺吳待之二十二年吳人往盟方出而赴之三戰至吳終復大恥三年而用之君子不咎其速機已至也二十二年而用君子不以為遲機未至也機未至則嬰兒處女敵人開户機已至則迅雷搏虎敵不能拒養兵以待機因機以用兵故惟不動動則有功自羣胡内亂五馬南渡天下遂餘二百年而不能混一者失其機也自晉迄陳有大機四而南人不知乘不亦惜夫方晉元帝之初中國無政蛇豕肆毒石勒初得中山造次未定而祖逖方在河南謀為進取晉之餘民昂首傾耳想聞官軍之鉦鼓逖若乘賊勢之未定因民心之深望掃河南之衆推鋒而前則石勒可禽乘破勒之勢則劉聰王彌之徒破膽而不敢戰矣而逖方且臣主相尤軍師不出以至身死不能成功因使劉石之徒遂為深根之冦此其所以失機者失之於念私延及孝武苻堅提北國之衆投之淝水返國未安姦孱未除慕容姚氏爭為割據此連雞不能俱飛鬭虎可以兩斃矣晉若乘之可以雙舉晉人蹈機而不知發幼度方且出歸漕粟以慰苻丕之窮劉牢之方且䇿馬過澗以增慕容之勢鼎足之形遂成中華之民重困此其所以失機者失之於氣怯延及於宋高乘天之厭亂民之惡敵出兵四征芟夷殆盡雖赫連拓跋而膽已破矣宋武若能用戰勝之銳以乘不敵之勢秣馬厲兵問罪四方則五胡遺種可膏斧鉞西北餘民可使返冠帶而武帝未忘其漁樵之志猶顧念江淮之地奔走還師以秦遺人事機之㑹一失南北之勢遂分此機之失失於志卑延及於梁武天厭魏祚禍其社稷女主專朝逆黨興兵君臣内亂無暇外圖南人若乘其間復收侵地發江淮之衆以衛燕伐徐命荆梁東西齊舉則混一之期指日可冀而梁氏父子方且高談釋老專營塔寺天下萬事無意經略遣偏將提輕兵深入邊庭不復繼援以敗其成功此其所以失機失於志荒機㑹之來豈可數得而屢失之可不深惜蓋天下之事德均則論勢勢均則論機而二百年間四失大機故有志之士莫不惜於斯納東魏侯景降中大同元年河南大行臺侯景素輕高澄嘗曰高王東魏勃海獻武王高歡在吾不敢有異王没吾不能與鮮卑小兒共事及歡疾篤澄為歡書以召之景聞歡疾篤用其行臺郎王偉計遂擁兵自固太清元年正月歡卒景自念已與高氏有隙内不自安據河南叛歸于魏澄遣司空韓軌督諸軍討景二月魏以景為太傅河南大行臺上谷公庚辰景又遣其行臺郎中丁和來上表請舉十三州内附上召羣臣廷議尚書僕射謝舉等皆曰頃歲與魏通和邊境無事今納其叛臣竊謂非宜上曰雖然得景則塞北可清機㑹難得豈宜膠柱然意猶未決嘗獨言我國家如金甌無一傷缺今忽受景地詎是事宜脫致紛紜悔之何及朱异揣知上意對曰聖明御宇南北歸心今景分魏土之半以來若拒而不納恐絶後來之望上乃定議納景壬午以景為大將軍封河南王周洪正善占候前此謂人曰國家數年當有兵起及聞納景曰亂階在此矣二年秋七月戊戌景反於壽陽以誅朱异為名臣燾曰智者能弊敵而吾受其利不智者徒自弊而何利之足云越之弊吳鬭其民而已秦之弊諸侯鬭其交而已漢之弊項羽鬭其君臣而已使自糜爛我乘其弊故不勞而功成不戰而敵破南北相持戰爭厯年而不能相并不知所以弊之也當高歡之死侯景分齊國之半求援於梁以鬭其君此可弊之㑹而亦利害之機智者所當審處夫以景之凶事齊齊不容之魏魏不内我若受之是代受其禍以景之才而河南之地密爾淮甸我若辭之則禍起目前故受之則變遲而禍大辭之則變速而禍小辭受之間利害之機不可不謹蓋景之南來非惟藉南之勢以復讎於北亦恐南與北通而前後蹙之也為南計者莫若用漢之所以御匈奴用唐之所以待突厥遣行人為卑辭以拒之曰區區小國何敢言臣哉欣戴有德掃除暴亂君若出河南之甲以快意於北則國請以賦從興師問罪願為前後之援事定功成永結兄弟之歡景得此則必喜而禍偏萃於齊矣使昏虐君臣相魚肉我因其隙收兩淮復三齊繕甲治兵以待其釁可以坐享其利何苦而信不誠之言冀无妄之福其始也褒崇尊大惟恐不至其終也規圖掩取惟恐不深方其微而尊之使强及其盛而激之使怨使不圖之終成大禍而為人之利焉可謂之智上伐東魏欲以鄱陽王範為元帥正陽侯淵明請行許之太清元年八月乙丑下詔大舉伐東魏遣南豫刺史正陽侯淵明南兖州刺史南康王㑹理分督諸將始上欲以鄱陽王範為元帥朱异在外聞之入曰鄱陽所至殘暴非弔民之材上黙然曰㑹理如何對曰陛下得之矣㑹理懦而無謀上聞不恱淵明時鎮壽陽屢請行上許之㑹理自以皇孫復為都督自淵明已下殆不對接淵明與諸將密告朱异追㑹理還遂以淵明為都督上命淵明堰泗水以灌彭城旬日而成十一月東魏大將軍澄使大都督高岳救彭城以金門郡公潘樂為副以慕容紹宗為東南行臺與樂偕行丙午紹宗至城下引步騎萬人攻漳州刺史郭鳳營矢下如雨淵明醉不能起命諸將救之皆不敢出北兖州刺史胡貴孫獨帥麾下與東魏戰紹擁衆數千不敢救遁還紹宗將戰一一引將卒謂曰我當陽退誤吳兒使前爾擊其背東魏兵實敗走梁人乘勝深入魏將卒以紹宗之言為信爭共掩擊梁兵大敗淵明胡貴孫等皆為東魏所擒臣燾曰蒲栁之資不可以經嚴秋蔓葦之草不可以逆怒風當危亂之世欲建非常之事故非常才之所能勝故漢之興為漢爭天下者蕭曺而代仲不與焉唐之興為唐爭天下者英衛而神通不與焉二主非不愛其親時有不可以梁武當戰之初時為進取之舉委任英豪猶慮無成而况淵明㑹理之不才居無事時猶當富貴之不及以政况當多事之際而使之握兵柄司民命任安危之寄乎嗚呼納侯景之非宜用㑹理之非才武帝皆明知之矣冒而為之不顧其害天豈奪其魄耶乖錯謬戾何至於此侯景敗還據壽春太清二年春正月己亥慕容紹宗以鐵騎五千夾擊侯景景士卒不樂南渡其暴顯等各帥所部降於紹宗景衆大潰爭赴渦水水為之不流景旣敗不知所適時馬頭戍主劉神茂素為監州事韋黯所不容聞景至故往候之景問曰壽陽去此不逺城池險固欲往投之韋黯其納我乎神茂曰黯雖據城是監州耳王若馳至近郊彼必出迎因而執之可以集事得城之後徐以啓聞朝廷喜王南歸必不責也景執其手曰天教我也神茂請帥步騎百人先為鄉導壬子景夜至壽陽城下黯以為賊也授甲登陴景遣其徒告曰河南王戰敗來投此鎮願速開門黯曰旣不奉敕不敢聞命景謂神茂曰事不諧矣神茂曰黯懦而寡謀可說而下也乃遣徐思玉入見黯曰河南王為朝廷所重君所知也今失利來投何得不受黯曰吾受命唯知守城河南自敗何預吾事思玉曰國家付君以閫外之畧今君不肯開城若魏追兵來至河南為魏所殺君豈能獨存縱使獨存何顔以見朝廷黯然之思玉出報景大恱曰活我者卿也癸丑黯開門納景景遣其將分守四門詰責黯將斬之臣燾曰壅水當壅之於源治病當治之於微泛濫而後治則神禹不能為功膏肓而後救則扁鵲不能為術故智者欲其辨之於早也侯景之凶其處心積慮固非一日五尺童子皆明知其心而武帝不知也及其渦陽敗績匹馬南還誅守將奪壽春不以事上聞反形見矣武帝固當少悟而徐為之計當此之時景兵新敗銳氣未復初得壽陽士心未定若乘敗氣之未復衆心之未定命將出兵而問其罪間結壽陽士心使為内應内外蹙之則侯景之命一夫可制此之不圖俟其徑度采石直指建康而方欲折箠笞之不亦晩哉六朝通鑑博議卷九
