body:
  text: 六朝通鑑博議卷十宋李燾撰岳陽王詧與湘東不和求援於魏魏人遣將經畧江漢三年十一月岳陽王詧旣與湘東王為敵恐不能自存遣使求援於魏請為附庸丞相泰令東閣祭酒榮權使於襄陽繹使司州刺史栁仲禮鎮竟陵以圖詧詧懼遣其妃王氏及世子寮為質於魏泰欲經畧江漢以開封府儀同三司楊忠都督三荆等十五州諸軍事鎮缺城仲禮至安陸安陸太守沈勰以城降之仲禮留長史馬岫與其弟子禮守之帥衆一萬趣襄陽泰遣楊忠及行臺僕射長孫儉將兵擊仲禮以救詧臣燾曰君子志於義而利自隨之小人貪於利而姦以濟之姦逆之謀利未至而害及焉惟君子能長有利昔者晉有驪姬之難文公在翟惠公在梁及奚齊不終秦人里克欲納文公文公辭焉欲納惠公惠公許之外以賂許其敵内以賂許其臣區區之心急於得國旣得之後而不能償其所許外憤内怨卒不能安文公徐起而收之安有晉國以伯諸侯故君子之不欲速所以久不見小利所以圖大利也當梁蕭之季因循之間以至失國而百姓未嘗一日忘之蕭詧以武皇之孫擁襄雍之地布德行惠以招大國之民伺湘東之隙則復大業雪讎恥安患不成而借冦讎之兵而害其懿戚旣而折地失位受制於敵為後世笑其所謂利果何在哉益州刺史武陵王紀叛上與魏書曰子糾親也請君討之益州遂陷世祖孝元帝承聖二年上聞益州刺史武陵王紀東下使方士畫版為紀像親釘支體以厭之又執侯景之俘以報紀初紀之舉兵皆太子員照之謀員照時鎮巴東執畱使者啓紀云侯景未平宜急進討已聞荆鎮為景所破紀信之趣兵東下上甚懼與魏書曰子糾親也請君討之太師泰曰取蜀制梁在兹一舉諸將咸難之大將尉遲回獨以為可泰乃遣回督原珍等六軍甲士萬二千騎萬匹自散關伐蜀臣燾曰連城之璧照乘之珠途之人知其不可以示盗賊况國之利器可輕以示敵乎故三監嘗叛周而周未嘗借兵於玁狁七國嘗叛漢而漢未嘗借兵於匈奴惟唐肅宗用回紇德宗用吐蕃其後入京師掠鳳翔欲借其利反為之害蓋示以利柄生其貪心則其為禍誠未易言梁魏之際蜀之在梁梁之寶也深閉固守猶懼敵之窺焉而明示之使之兼并是元帝之智曽不若途之人也况武陵之變王陳諸將自足以制其死命何必以利資敵而自為之驅除哉元帝都江陵八月庚子下詔將還建康領軍將軍胡僧祐太尉黄羅漢吏部尚書宗懍御史中丞劉殻諫曰建康王氣已盡與冦正隔一江若有不虞悔無及也上令朝臣議之黄門侍郎周洪正尚書右僕射王褒曰今百姓未見輿駕入建康謂見列國諸王願陛下從四海之望時羣臣多荆人皆曰洪正等東人也志願東下恐非良計洪正靣折之曰東人勸東謂非良計君等西人欲西豈成長䇿上笑又議於後堂㑹者五百人上曰勸吾去者左袒左袒者過半武思太守朱買臣曰建康舊都山陵所在荆鎮邊疆非王者之宅願陛下勿疑以致後悔上使術士杜景豪卜之不吉對上曰未吉退而言曰此兆為鬼賊所畱也上以建康彫殘江陵全盛意亦安之卒從僧祐等議臣燾曰王者必居形勢之中以為四方之望商都亳周都洛秦漢都長安天下之中也魏居許吳居建康蜀居成都一國之中也孫權欲都鄂而昭烈不可温嶠欲都㑹稽而王導不可以為建康之地前枕大江後倚百越左擾泗海右連荆蜀緩急有變左右前後迭為屛蔽此於形勢之中王者之居也而元帝有如此之勢不能居之顧戀舊鎮不忍輕去不知蜀雍旣去楚為孤立介居一陲前後無援是自閉於穴中也欲不亡得乎哉嗚呼項羽念霸楚而失關中梁元念江陵而失建康皆以匹夫之智遂失天下之勢以至身亡豈不愚甚矣夫魏立梁王詧為梁主資以荆州而取其雍州之地三年冬十月魏立梁王詧為梁主資以荆州之地延袤三百里仍取其雍州之地詧居江陵東城魏置防主將居西城名曰助防外示助詧備禦内實防之詧將尹德毅說詧曰魏冦貪惏肆其殘忍殺掠士民不可勝紀江東之人塗炭至此咸謂殿下為之今魏之精卒盡萃於此若殿下為設享㑹請于謹為歡預伏武士因而斃之分命諸將掩其營壘大殲羣醜俾無遺類收江陵百姓撫而安之王僧辯之徒折簡可致然後朝服濟江入踐皇極晷刻之間大功可立詧曰卿此䇿非不善也然魏人待我厚未可背德若遽為卿計人將不食吾餘旣而闔城長幼被擄又失襄陽詧乃歎曰恨不用尹德毅之言臣燾曰周之取梁幸也非智也臣謂其智於取雍愚於取荆其不敗於荆者幸也梁以襄陽為雍州其地北接宛洛跨荆楚襄陽旣去則江陵受敵旣危則建康可憂楚之北門吳之右臂周瑜嘗欲據之以蹙曹操關羽嘗欲取之以震許洛元魏嘗欲圖之以搖荆沔古之英豪所以勤身殘民百戰而争其不可得者不幸天欲禍梁兄弟内亂自納於周周人從之不待其言安得不謂之智而當是時北有高齊南有王陳諸將輕出其兵越人之都謀人之國若岳陽從尹德毅之言則齊人殲于謹之禍見于目前西北之冦亦起而軋之周之為周或可寒心安可不謂之愚嗚呼以累世之敵一言來赴其意豈世梁哉蓋欲虞虢我也而梁人不悟始也為之役中也聽其命始終不悟自墮其計中可謂幸矣陳論臣燾曰臣嘗論南北之際宋梁為强齊陳為弱梁固强矣而宋最强齊固弱矣而陳尤弱江南建國蔽之以淮淝之阻則藩維乃固制之以巴蜀之險則上流乃安齊雖云弱蜀猶在我裴叔業之未叛淮南尚未失也自侯景之亂梁室遂微高齊遣辛術掠江淮藩維之勢無復存矣西魏遣尉遲迥入益州上流之援無可恃矣及後梁國于襄陽又遷于江陵則扼吾之吭折吾之脊不得高枕而臥矣此陳之所以尤為弱也宣帝大建中雖命吳明徹乘高齊之衰收復淮南又欲經營徐兖而乘周人滅齊陳師敗於清口由是自江以北復歸於周夫荆襄之地旣以陷没上流不安乃欲逺争彭汴其功之無成宜哉大扺吳蜀相應如左右手茍與人鬭左手雖奮而右無以應之則不可望其能勝也如有蜀則吳强無蜀則吳弱東晉以平李勢宋武必平譙縱至於齊梁而無西顧之憂其間惟陳氏無蜀是以魏取西蜀晉旣代魏而因以平吳周取蕭撝隋旣代周而因以入陳北方之能并南方者晉與隋耳則皆以無蜀而亡然孫氏雖無蜀而荆州無恙陳旣無蜀又無荆州故孫氏之禍遲陳氏之禍速所以畧異蜀與荆州其與天下重也如此詎不信夫吳明徹伐北齊收復淮南之地宣帝大建五年春三月帝謀伐齊公卿各有異同惟鎮前將軍吳明徹決䇿請行壬午分命衆軍以明徹都督征討諸軍事裴忌監軍事統衆十萬伐齊明徹出秦郡都督灋􅉤出厯陽齊人遣軍救厯陽庚申黄灋􅉤擊破之又遣開府儀同三司尉破胡長孫洪畧救秦州辛酉戰于吕梁齊軍大敗尉破胡走長孫洪畧戰死甲子南譙太守克石梁城五月己巳梁城降癸酉陽平郡降甲戌徐槾克廬江城厯陽窘蹙乞降黄灋􅉤緩之則又拒守灋􅉤怒帥卒急攻丙子克之進軍合淝合淝望旗請降己邜齊北高唐郡降乙酉南齊昌太守黄詠克齊昌外城丙戌廬陵内史任忠軍于東關克其東西二城進克蘄城戊子又克譙郡城秦州城降癸巳瓜步胡墅二城降辛丑吳明徹攻壽陽堰淝水以灌城乙巳躬擐甲胄一鼓拔之十一月甲戌淮隂城降庚辰劉桃枝克朐山城辛巳樊毅克濟隂城己丑魯廣達攻濟南徐州克之十二月壬午盡復江北之地臣燾曰江南之國六吳陳為弱而孫氏久陳氏蹙薦紳之議以為孫權勇而能斷陸遜忠而能謀臣主俱賢故能保有江南以遺後人而陳氏主荒臣謬刑政不立故不能永世以為人驅除是不然以高帝之英豪斬侯景定僧辯南刼齊師取梁國如反覆手繼以文宣之恭儉勤政而徐陵吳明徹佐之君臣父子豈下孫氏而長短異効强弱殊勢何也吳得荆通蜀而陳失之也荆蜀居江之上流敵得之可以順流而窺我我得之可以據流而拒敵吕蒙用於吳而欲收荆陸遜用於吳而欲收蜀誠以利害之地不可不先圖故陳氏之失失在於急爭淮汴緩圖荆雍蓋淮汴之地前限大江猶在城郭之外可以施扞禦之力若荆蜀之勢則竊發肘腋直擣心腹雖有智者不能為之謀陳人徒知乘齊之亂而圖淮南畏周之强而緩荆雍不知當此之時周亦不得為無事强臣專政幼主内憤此可以為之計矣陳之臣主若能遣辯士損萬金交鬭其間使之君臣相爭朋黨分立内自為圖不暇外謀則陳氏君臣孤注而已我因其隙移伐汴之衆疾攻而取之乘破梁之威率兵西下徑出潼川直指成都則劒閣之道自成斷絶祖孫氏之餘智收荆用蜀進可以圖天下何至於不能自守捨此不為空爭兩淮譬如壊牆修治補葺未必可以禦冦適足以自困故孫權常欲上岸取徐州而吕蒙以為不可欲擒曹休震洛陸遜以為不可至於荆蜀則圖之惟恐其後守之惟恐其懈彼其用吳為審於陳是以能久吳明徹與周爭徐兖之地明徹大敗大建九年十月上聞周人滅齊欲爭徐兖詔吳明徹督諸軍伐之明徹軍至吕梁周徐州總管梁士彦帥衆拒戰戊午明徹擊破之士彦嬰城自守明徹圍之十年正月明徹圍周彭城環列舟艦於城下攻之甚急王軌引兵輕行據淮口結長圍以鐡鎖貫車輪數百沈之清水以遏陳船歸路軍中恟懼一旬之間水路遂斷周兵益至時明徹苦背疾篤甲子決堰乘水勢退軍冀以入淮至清口水勢漸微舟艦並礙車輪不復得過王軌引兵圍而蹙之衆潰明徹為周人所執將士三萬并器械輜重皆没於周臣燾曰凡用兵者吾之所長吾則出而用之吾之所短吾則匿而置之此非善用兵者也吾欲用長而敵將不與吾爭吾欲匿短而敵將强與吾角此其所用猶有所窮不若因其所短用其所長昔者戰國之時晉悍齊怯孫臏因齊人之怯減竈以疑晉而龎涓禽三國之際魏勇蜀懦諸葛亮因蜀之懦立法以制魏而仲達走可謂善用所長矣江南之人雖城守有餘而野戰不足剽悍之氣實輕於進明徹若能作其輕進之性與為掠地之計簡輕騎率步卒使勝則輕進敗則易退不幸而無功猶足以自全而欲以舟車為攻城之具水勢為進退之資置所長暴所短以與人爭軍敗身執自取之也周師入冦江北之地皆没於周十一年冬十一月辛卯周韋孝寛分遣杞公亮自安陸攻黄城梁士彦攻廣陵甲午士彦至肥口戊戌周軍進圍壽陽詔開府儀同三司南兖州刺史淳于亮為上流水軍都督中領軍樊毅都督北討諸軍事左衛將軍任忠都督北討前軍事豐州刺史臯文奏帥步騎三千趣陽平郡癸卯任忠帥步騎七千趣秦郡丙午仁威將軍魯廣達帥衆入淮樊毅將水軍二萬自東關入焦湖蕭摩訶帥步騎趣厯陽戊申韋孝寛拔壽陽杞公亮拔黄城梁士彦拔廣陵辛亥又取霍州癸丑以揚州刺史始興王陵為大都督總水步軍衆乙丑南北兖晉三州及盱眙山陽陽平馬頭秦厯陽沛北譙南梁等九郡民並自拔還江南周又取譙北徐州自是江北之地盡没于周臣燾曰善取國者取之漸取而敵不知善守國者守於始守而敵不議秦之取諸侯歲用十師而十萬之衆所爭不過一城長平之戰殺人之將坑人之兵震動天下而其所得上黨而已故秦之所攘取者不過尺寸而諸侯無甚顧惜不知日削月朘地盡而身隨之此秦之所以為善攻而諸侯之所以為不善守周之取陳蓋用是道惜乎陳人之不早悟也方其取蜀取漢東取沔北旣而江北之地又盡取之斬其指爪而陳不知痛及芟夷殆盡方欲出兵而與人鬭何其悟之晩也古之人尺地一民不輕以予敵恐其浸淫疽食將及於心腹耳隋取江南隋高祖開皇九年正月乙丑朔賀若弼自廣陵引兵濟江先是弼以老馬多買陳船而匿之買弊船五六十艘置於瀆内陳人覘之以為内國無船又請緣江防人每交代之際必集廣陵於是大列旗幟營幕被野陳人以為隋兵大至急發兵為備旣知防人交代其衆復散後以為常不復設備又使兵緣江時獵人馬喧噪故弼之濟江陳人不覺韓擒虎將五百人自横江宵濟采石守者皆醉遂克之戊辰陳主下詔中外戒嚴以驃騎將軍蕭摩訶護軍將軍樊毅中領軍魯廣達並為都督將兵領南豫州重立賞格僧尼道士盡令執役庚午賀若弼拔京口辛未韓擒虎進攻姑孰半月拔之江南父老來謁軍門晝夜不絶於是賀若弼自北道韓擒虎自南道並進緣江諸城望風並走己卯王世積以舟師出九江破陳將紀瑱於蘄口陳人大駭降者相繼陳主素怯懦不達軍事唯晝夜啼泣臺内處分委施文慶文慶知諸將疾已恐其有功由是諸將凡有啓請率皆不行甲申使魯廣達陳於白土岡蕭摩訶軍最在北若弼登山望見衆軍因馳下勒陳以待之陳主通於蕭摩訶之妻故摩訶初無戰意唯魯廣達以其徒力戰弼更引兵趣孔範範兵暫交即走騎卒潰亂擒摩訶任忠帥數騎迎降引擒虎軍直入朱雀門陳人欲戰忠揮之曰老夫尚降諸君何事衆皆散走時陳人宗室王侯在建康者百餘人陳主皆召入禁中令屯朝堂及臺城失守相帥出降臣燾曰聖人之於坎之彖曰天險不可升地險山川丘陵王公設險以守其國故倚岳為城塹海為池高而不可攀深而不可測此天地之形而王公之險不與焉雖使山海四蔽而國家無政形勢不立敵人過之如涉平地譬之千仞之山萬仞之淵而無龍虎之威則牛羊牧其上舟楫泳其間而無所甚憚知其不足畏也故欲立國者先立其勢不可犯而後國可守孫權宋武之所恃以守江南不特恃萬里之江亦恃其法制嚴將卒勇而二魏之人不可輕犯也江南自宋武之後四維不張而茍且之政多觀何欽容之言視孝武之所為而知風化之不厚觀任昉之彈四户諸鬼之目而知政刑之不立見元嘉之敗洛口之㵒而知軍旅之無素薛安都常珍奇之變裴叔業亦欲為河南公而將帥無腹心之撫彭城之誅義宣之變重典籖之官而宗子無維城之固民風國勢所立如此而又朝廷百官人各有心四方萬里民各有意是以萬里長江守之者無人隋人取之如拾草芥積弱之勢有自來矣先王知險之不可偏恃以守國也故明政刑立法制厚風俗上下立分臣主一心使國勢岌然敵不敢近故能藉天地之形為長久之計向使四代之君能因吳越之資倚江淮之固藉荆楚之援明法立制務耕織選將吏修守戰之備君臣一心而鬭北人則混一之計何患不成何懼不能守乎六朝通鑑博議卷十
