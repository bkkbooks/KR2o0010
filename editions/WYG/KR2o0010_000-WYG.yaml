body:
  text: 六朝通鑑博議史評類提要臣等謹案六朝通鑑博議十卷宋李燾撰燾字仁甫眉州丹稜人登紹興八年進士官至敷文閣學士提舉佑神觀贈光禄大夫諡文簡事跡具宋史本傳燾博極載籍慨然以史學自任宋代典故尤悉力研覈所撰續通鑑長編卷帙浩繁最稱贍博精審今已别著於録此書詳載三國六朝勝負攻守之迹而繫以斷論案燾本傳載所著述無此書之名而有南北攻守録三十卷其同異無可考見核其義例葢亦江東十鑑之類専為南宋立言者然十鑑徒侈地形飾虚詞以厲戰氣可謂夸張無寔此則得失兼陳法戒具備主于修人事以自强視李舜臣所論較為切寔史稱燾嘗奏孝宗以即位二十餘年志在富强而兵弱財匱與教民七年可以即戎者異又孝宗有功業不足之嘆燾復言功業見于變通人事既修天應乃至葢其納規進誨惟拳拳以立國根本為先而不侈陳恢復之計是書之作用意頗同其忠藎亦殊足尚也乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:fdedfdf0e47d816fb96026317dadca69c4e3f493ab16daa65434f92f908d4bd5
