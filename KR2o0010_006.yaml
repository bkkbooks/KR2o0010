body:
  text: 六朝通鑑博議卷六宋李燾撰宋論臣燾曰臣嘗謂宋武帝以英特之資鋭意征伐之事先定巴蜀乃鳴金擊鼓驅江南之衆以與夷狄從事於中原義旗東舉則慕容出降天戈西指則姚泓就縛中國之氣至是亦以振矣故臣論六朝之君惟吳善守而武帝善攻善守故曹氏雖强而不敢攻善攻故能因五胡之衰而撲滅之方武帝入關之初晉之遺民垂涕相賀魏兵雖衆翺翔河上不敢出迎其鋒其事亦可見也使劉穆之不死武帝無後顧之患得少留於中原震之以威名壓之以重勢狥三秦恱附之意因諸將戰勝之鋒以平殄北方之餘冦則拓跋之魏赫連之夏無復有遺種矣天下其有不混一乎雖武帝功未克就而能於元魏方盛之時摧燕誅秦挫其鋭氣使魏明元褫魄喪膽落祈哀請和其子太武雖能盜其河南四鎮而瓜步之役土不闢一廛兵不戍一城受辱於旴𣅿惶遽以歸非武帝之餘烈預有以挫之則元魏回山倒海之勢必不如是而止也若武帝初無征伐之功元魏先人舉事今日并燕明日并秦又明日并夏并蜀先據天下之腹心且居江南之上流至於太武兵臨瓜步則其為劉氏之禍決不細矣裔夷不能陵中夏左衽不能衊衣冠雖江南人謀之善抑亦彼蒼之陟鑒在焉故元魏方强而武帝震揚兵威以逆折其鋒上天祐華之意昭昭如此及文帝窮兵黷武孝武明帝疑忌大臣宗室而武帝之業遂衰惜夫王康守金墉城臣燾曰民有怒心則可與之戰民有固志則可與之守若居無常守養無定業平居猶可共處緩急則皆四散雖有江山之形亦不足恃以為固故古之守者必先謀其所留百姓之心使無反顧之念則雖有百萬之冦環於城下不足憂矣是故善守者恃民不恃兵於草昧之世墾營菑難若皆恃兵以守又安得而給諸故以兵守者非守之妙也宋武之失在於專用鬭將以撫新附使恃力盡而城亡誠使武帝得如王康者數十人分守新邑鎮撫疲力與之耕桑共為死守而選賢將提重兵據要害以為之臂援則新復之地有不能守者乎魏謀來伐崔浩以南人惟長守城當先掠地武帝永初三年魏主聞高祖殂議發兵取洛陽虎牢滑臺十月魏軍將發公卿集議於監國之前奚斤欲先攻城崔浩曰南人長於守城昔苻氏攻襄陽經年不拔今以大兵坐攻小城若不時克挫傷軍勢敵得徐嚴而來我怠彼鋭此危道也不如分兵略地至淮為限列置守宰收斂租穀則洛陽滑臺虎牢更在軍北絶望南救彼必沿河東走則為囿中之物何憂其不獲也公孫表固請攻城魏主從之臣燾曰兵以勢攻以氣守昔者秦嘗欲攻諸侯嘗欲和秦非能攻諸侯非不能守乘戰勝之威而勢在秦諸侯之氣已折而不敢敵故善用兵者作其勢以攻蓄其氣以守攻則使天下莫敢拒守則使天下莫敢窺此善之善也崔浩之言未覩攻守之妙也彼徒見夫殷浩禇裒之敗而苻氏之不能克襄陽以為南人長於守城野戰則不足憚而不知夫春秋之時吳楚遜其兵於諸侯邲之戰艾陵之戰黃池之爭齊晉之所不敢敵至於六朝之際謝𤣥之所用以定三魏宋武之所用以平齊秦陳慶之所用以取三十二城卒至洛陽者皆江南之人也安可謂之不長於攻特永初之際王康以將懦攻則輒敗固圈其卒以守爾使有賢將能作吳楚剽悍之氣乘索虜之不備以爭中原又安往而不得志故弱敵而不戒禍莫甚焉使江南而有人則崔浩之言豈不為魏氏之深禍魏人再取河南臣燾曰荀子曰兼并易能也堅凝之難故攻城掠地所以來其民者易布德行惠所以留其民者難秦之既亡金城之地劉項俱能取之究其所終歸于漢豈非所以留之者有不同歟宋武帝以龍虎之姿有并吞五胡之意舉河南如拾芥而失之亦同棄梗得失之間何其易也蓋武帝知所以取之爾當其時百年之餘民望晉之心可謂深矣若於始至之日布德惠表忠良用賢守令鎮撫疲民以慰百年之望則雖有强暴之敵懷侵陵之志慕義之人決未忍輕去中國也惜夫武帝之不知出此赫連定約伐魏魏主破定因冦河南元嘉七年八月己丑夏主遣使求和約合滅魏遙分河北自恆山以東屬宋以西屬夏魏主聞之以問崔浩對曰義隆與赫連定遙相招引以虛聲唱和共窺大國義隆望定進定待義隆前皆莫敢先以此觀之儜兒情見不過欲固河自守赫連定殘根易摧擬之必仆克定之後東出潼關席卷而前則威震南極江淮以北無立草矣願陛下勿疑甲辰魏主如統萬遂寰平涼以衛兵將軍鎮蒲坂乙亥魏安頡自委粟津濟河攻金墉金墉城不治既久又無糧食杜驥遂南遁丙子魏安頡拔洛陽與龍驤將軍陸俟進攻虎牢辛巳拔之臣燾曰凡國交逺而攻近未有交虛而攻實者也逺交所以害敵近攻所以利己昔秦嘗交齊趙攻韓魏齊趙足以害韓魏韓魏折而入於秦秦益以强此秦之所以為計也至於赫連定摧敗餘根而宋文與之連衡恃以破魏若為魏所破則吾之心先怯而敵之氣必怒以方怒之氣敵已怯之心不戰先敗夫交之本以害敵而適以怒之本以為利而反致害焉不亦惑乎洛陽虎牢失守垣護之王仲德欲守滑臺到彥之棄城去青兖大擾元嘉七年十一月到彥之聞洛陽虎牢不守諸軍相繼奔敗欲引兵還垣護之以書諌之以為宜使竺靈秀助朱修之守滑臺自帥大軍進擬河北且曰昔人有連年攻戰失衆乏糧猶張膽爭前莫肯輕退况今青州豐穰濟漕運通士馬飽逸威力無損若空棄滑臺坐喪成業豈朝廷受任之旨邪彥之不從欲焚舟步走王仲德曰洛陽既陷虎牢不守自然之勢也今敵去我猶千里滑臺尚有强兵若遽捨舟南走士卒必散當引舟入濟至馬耳谷口更詳所宜彥之先有目疾至是大動且將士疾疫乃引兵自清入濟南至歷城焚舟棄甲步趨彭城竺靈秀棄須昌奔胡陸青兖大擾臣燾曰兩軍相持勝負未決一進一退國勢所繫不可不謹劉項之在京索曹袁之在官渡皆以十一之衆相持經年莫肯先退先退則其勢屈雖欲復振亦難為力故古之人重其退到彥之掃江南之衆以與敵爭前軍雖敗而中堅所統精卒重兵尚未損若棄釡破甑焚舟并糧斷其回望而告之以無所歸置之死地并力一戰未必不成功何遽走乎師未見敵曵兵而走自沮其勢騷動內外驚懼逺邇棄甲於無用潰民於不戰是自為敵攻也擇將不善禍一至此殺檀道濟魏人大喜文帝元嘉十一年司空江州刺史永修公檀道濟立功前朝威名甚重諸子又有才氣朝廷疑畏之帝久疾不愈劉湛說司徒義康以為宫車一日晏駕道濟不復可制㑹帝疾篤義康言之帝召道濟入朝其妻向氏謂道濟曰高世之勳自古所忌今無事相召禍其至矣既至留之纍月固執之三月下詔稱道濟潛散金貨招誘剽猾因朕寢疾規肆禍心收付廷尉并其子黃門侍郎植等十一人誅之道濟見收憤怒目光如炬其吕切火炬也脫幘投地曰乃壞汝萬里長城魏人聞之喜曰道濟死吳子輩不足復憚臣燾曰士有所持而後敢戰敵有所畏而後不敢拒敢者在我不敢者在敵未戰而勝負判矣蓋戰者卒也所恃以戰者將也知吾將之足恃而後士勇於戰故威名之將人主之所崇重也劉氏自滅秦之後爪牙股肱誅戮殆盡其所餘獨檀道濟耳尊崇任使以壯士卒之心銷敵人之氣用為攻守之基猶懼其不足而忍殺之乎既自壞其藩籬而謂長江大河可恃以不敗不知古之守者守以人不專以地吳之存亡決於陸抗唐之安危決於李績蓋地無常勢强弱在人而其人安可不重魏冦青兖冀三州何承天陳四策二十三年帝以魏冦為憂咨訪羣臣御史中丞何承天上表其䇿有四一曰移逺就近今青兖舊民及冀州新附在界首者二萬餘家可悉徙置大峴之南以實內地二曰浚復城隍以居新徙之家假其經用春夏佃牧秋冬入保冦至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼓譟足抗羣冦三萬矣三曰纂耦車牛以載糧械計千家之資不下五百耦牛為車五百兩參合鈎連以衛其衆設使城不可固平行趨險賊不能干有急徴發信宿可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由已還保輸之於庫出行請以自衛弓簳利鐵民不得者官以漸充之數年之內軍用粗備近郡之師逺屯清濟功費既重嗟怨亦深以臣料之未若即用彼衆之易也今因民所利導而帥之兵强而敵不戒國富而民不勞比於優復隊伍坐食糧廩者不可同年而校矣臣燾曰古之君子敵國相持必為持久之計以待機㑹之來使兵動而不困民安而食不乏外不失所以養兵內不失所以為國然後可以有萬全之功曹操之謀天下先由許洛司馬懿之謀吳先由淮泗諸葛亮之謀魏先由渭南先謀根本後謀攻守此䇿之上也六朝之際南北相持百年之敵兵出征討誠不可一舉而平若不先為根本之圖歲歲興師歲歲運糧如是不息國不待戰而危矣故何承天之計大佃積穀非惟進取之良規抑亦固守之長䇿以皇子鎮彭城元嘉二十五年二月彭城太守王𤣥謨上言彭城要兼水陸請以皇子撫臨州事夏四月乙卯以武陵王駿為安北將軍徐州刺史臣燾曰事有所甚利聖人不顧有所甚害聖人不避非惑於利害也亦有所就而已人有所寶之器必使子弟守之徑兵重地天下所愛而聖人往往付之它人聖人之智豈不知此以為使子弟守之子弟而不才為敵人有不若使它人守之它人之才尚為吾有天下利害無全擇其多者而就之斯可矣當宋之初彭城之地水陸要衝彼此所爭而必使幼子弱弟橫居其任蓋其心以桓溫蘇峻之禍為可慮也而不知義康之棄城辱甚於桓溫義宣之內逼痛酷於蘇峻人心無常奚可預定委任忠賢不亦安乎上議北伐羣臣固諫魏王分上書論和好之便臣燾曰凡兵有餘而用不足則養威蓄鋭不見其形所以養也數出並出雷奔電掣所以用也養則人莫能測用則人莫能禦未有嘗養而輕用以虛耗其氣者昔越踐之謀吳弔死振貧斂形匿迹二十二年不敢輕動吳隙既開一舉而夷之可謂知所養知所用矣當宋之初養威不動堅守其所猶有懼焉奈何遽然出兵見其不足之形於外使敵知吾不能為而無所憚吾之士知敵之不可當而有所畏以無所憚之衆臨有所畏之卒宜乎一鼓而南莫之能禦矣故古之善用兵者如養赤子日摩月撫以待其壯壯而後用於一舉一舉而勝再則鋭三則有不可敵之勢一舉而敗再則疑疑則有不敢戰之心不可與不敢之形見則雌雄分矣故古之人用兵謹於其始蕭斌王𤣥謨引兵伐魏栁元景等克潼關逼虎牢聞𤣥謨敗乃還元嘉二十七年春正月遣王𤣥謨沈慶之申坦受督於青冀二州刺史蕭斌斌遣𤣥謨進攻滑臺隨王誕遣栁元景尹顯祖曾方平薛安都龎法起將兵出𢎞農龎季明請入長安招合夷夏又遣安巒司馬劉康祖將兵助坦進逼虎牢冬十月乙丑魏主渡河衆號百萬鞞鼓之聲震動天地𤣥謨懼退走魏人追擊之死者萬餘麾下散亡略盡十一月甲午克陜城龎法起等進攻潼關魏戍主婁須棄城走法起等據之關中豪傑所在蜂起及四山羌胡皆來送款上以王𤣥謨退敗魏軍深入栁元景等不宜獨進皆召還臣燾曰兵有所不攻有所必攻兵强則攻敵之必救所以搗其巢穴而為一舉之計兵寡則攻敵之不顧所以養吾之邊鄙以為攘奪之資如此則可與言攻矣當南北之相攻計劉氏之力一舉而未必能破魏得地未必能堅守不若并為一道竭力以事關中蓋關中者敵所不救吾所欲得關中在魏山河之外千里而爭河北空虛畏吾之搗其心腹故其救之也必輕而聞吾得關中則可以外連巴蜀秦蜀恥則吾之臂益强并力爭之則其赴之也必鋭以輕救之衆當盡鋭之師則王蕭之兵必不空行不空反矣而不量力度德以數萬之師分為數道一處偏敗衆師皆攜是自敗之道也六朝通鑑博議卷六
