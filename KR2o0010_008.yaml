body:
  text: 六朝通鑑博議卷八宋李燾撰淮北四州民不樂屬魏常思歸江南上詔李安民督諸將往迎之安民赴救遲留南歸者皆為魏所掠殺建元二年冬十月淮北四州民不樂屬魏常思歸江南上多遣間諜誘之於是徐州桓摽之兖州民徐猛子等所在蜂起為冦盜二年三月摽之等有衆數萬寨險求援庚子詔李安民督諸將往迎之安民赴救遲留摽之等皆為魏滅餘衆得南歸者尚數千家魏人亦掠三萬餘口歸平城臣燾曰凡民有所愛而後輕來有所恃而後重去知吾德之足愛知吾勢之足恃則去就之機決若鰓鰓然慮吾之不足恃其憂敵之來則留處之心必不固矣古之人當爭奪之交耀兵郤敵求張其勢謀所以留其民也故諸葛亮不能赴三郡之急終身不能臣魏非其德薄勢不足恃耳南北分裂冠帶之民陷為左衽而眷戀之心未嘗一日而忘中華桓摽之等不逺千里而赴訴於齊齊之君臣匍匐往救猶恐其緩而使偏將輕兵逗遛觀望成敵人之勢於必勝置向義之徒於必死使遺老殘民知吾之不足恃敵之為可畏自是北人不復來矣魏孝文遷都洛陽永明十一年魏主召穆亮使與尚書李沖將作大匠董爾經營洛都乙未魏解嚴設壇於滑臺城東告行廟以遷都之意大赦起滑臺任城王澄至平城衆始聞遷都莫不驚澄援引古今徐以曉之衆乃開伏澄還報於滑臺魏主喜曰非任城朕事不成建武元年二月壬寅使羣臣更論遷都事八月戊申親告太廟使高陽王雍子烈奉遷神主于洛陽辛亥發平城戍卒魏主至洛陽臣燾曰臣於魏孝文徙都之事而益知天意之所在矣裔而謀夏夷而亂華豈天意之所與哉今孝文又以封豕長蛇之性荐食上國卜宅中土遂欲以氣吞江南而有之其無中國甚矣於是上天震怒速底其罰孝文遷都之後坐席未暖太子畏熱則反諸王至山東則又反大臣歸河北則又反雖夷狄之性不安於中華然亦可以知天意之所在也孝文不知畏天貪婪之心死而未巳連歲南伐卒以不還傳世一再女主擅朝姦臣竊命而拓跋氏之基業遂不安矣當時若使齊室僅得中主君臣以乘其亂則百年之冦一朝可平惜其怯懦太過坐視其亂而無能焉上失天意下違民心豈不惜夫魏主自將入冦欲飲馬於江沈文季嚴加守備魏師尋退建武二年春正月甲申初上聞魏主欲飲馬於江懼遣尚書右僕射沈文季助豐城公遙昌守壽陽文季入城上遊兵不聽出洞開城門嚴加守備魏兵尋退臣燾曰善保國者保其勢不保其形使吾有不可犯之勢敵有不敢輕之心雖無金湯之形猶足恃以自固故兩敵相對莫肯相下者重其勢而已齊明之初河北之人未測其淺深君臣聚議不敢輕動魏文雖違其臣民之言為空國之舉而其心猶不能無畏齊之君臣若能使荆蜀之人佐襄陽之救據城堅守以留其歸而出吳越之甲發江淮之衆分為兩道東道向冀州西道衝中山乘其遷徙之未定軍師之未返而搗其空虛則魏之返救將不暇振旅襄陽之圍自解魏之匹馬自是當不復南向矣魏主入冦雍州五郡皆沒四年魏主先取樊鄧真度引兵南冦太守房伯玉擊敗之魏主怒以南陽小郡志必滅之遂引兵冦向襄陽李崇槎山分道出氐不意表裏襲之羣氐皆棄楊靈珍散歸崇進據赤土梁州刺史隂廣宗將兵救靈珍崇進擊大破之斬楊婆羅阿卜珍猷等靈珍奔還漢中丁未魏主發南陽太尉咸陽王禧攻之己酉魏主至新野新野太守劉思忌拒守魏右軍長史韓顯宗將别軍屯赭陽成公期遣胡松引蠻兵攻其營顯宗力戰破之斬其禆將高法援上詔徐州刺史裴叔業引兵救雍州叔業引兵攻虹城獲男四千餘人甲戌遣太子中庶子蕭衍右軍司馬張禝救雍州十一月甲午前將軍韓秀方等十五將降於魏丁酉魏敗齊兵於沔北十二月庚申魏人攻拔雍州永泰元年春正月甲子魏人拔宛北城房伯玉靣縛出降三月壬午朔崔慧景蕭衍大敗於鄧城時慧景襄陽五郡已沒臣燾曰天下形勢之地全得者強偏得者亡在春秋時紀季以􅀈入於齊紀於是始判而紀侯不得不下於齊在三國時郝普等以三郡內入於吳荆於是始分而關羽不得不禽於吳蓋形分則危力分則弱故智者惡其分南北之時雍州之地郡惟十七全據其土猶懼不足以當魏况棄其守以與之人民風氣扼塞地利險固與我共之矣與人共利強者終勝分其利以與之吾又弱焉宜乎為其所勝故五郡既沒義陽諸城相次淪亡勢當然也梁論臣燾曰臣嘗論武帝居可為之時而無必為之志普通大普之際元魏已衰女主顓朝姦臣擅命危亡之形已可見矣武帝乃命夏侯亶拔壽春湛僧智挾廣陵韋放拔渦口淮上之地一旦盡復又命陳慶之送元皓還北慶之自銍城乘虛進兵取三十二城四十七戰所向皆克魏主遂棄洛陽渡河走真所謂有可為之時矣使武帝既居可為之時而有必為之志分命諸將乘破竹之威與慶之犄角一軍踰函關徇秦隴一軍度青水掠青齊一軍跨河追躡魏主時元皓既得志已有叛梁之謀因命慶之數其背叛之罪斬皓據洛嚴勒中軍為諸將節度河南之人既失其上無自固之心青齊秦隴聞王師之至必皆降附然後秦隴之軍自臨晉濟河青齊之軍自碻磝濟河諸軍並進以蹙元魏元魏雖有爾朱榮之兵又何足以抗吾堂堂之鋒哉如是則元魏之主必靣縛軍門而混一之功成矣奈何慶之之行才與衆七千人又不遣兵應援遂使元魏復強而慶之有沙門之竄武帝謀之不善故也况武帝崇尚浮屠捨身施佛今日造一寺明日建一塔將帥之謀不暇顧問軍旅之事豈復究懷非惟混一之功齟齬無成至於邊鄙之防例皆闊略所以侯景舉河南之地來降不能深思逺慮而墮其姦計夫武帝有可以混一之理而不能成混一之功侯景之來所不當受而又輕納其降既不能得河南則與宗社而並棄之孰謂武帝為有謀乎元帝以藩王將兵討平侯景功足尚矣然自元帝叔姪自相魚肉不旋斾建康而止都江陵卒為外冦所乘終禍嗚呼如武帝之賢而尚不克於此則元帝又何責哉魏元英冦義陽曹景宗不救義陽自陷武帝天監二年八月庚子魏以鎮南將軍元英都督征壽陽諸軍事司州刺史蔡道恭聞魏軍將至遣驍騎將軍楊由帥城外居民保賢首山為三柵冬十月元英諸軍圍賢首柵柵民任馬駒斬由降魏魏人披關要潁川大峴三城白塔牽城清溪皆潰三年正月蕭寅行及汝隂東城已為魏所取乃屯壽陽棲賢寺任城王澄在外襲壽陽據其外郭丁酉戰于邵陽大敗梁兵上遣曹景宗王僧炳等帥步騎三萬救義陽元英遣元逞等據樊城以拒之三月壬申大破僧炳於樊城魏召任城王澄以四月淮水將漲澄引兵還壽陽五月魏人圍義陽城中兵不滿五千人食才支半歲魏軍攻之晝夜不息刺史蔡道恭隨方抗禦相持百日前後斬獲不可勝計魏軍將退會道恭疾卒魏人聞道恭卒攻義陽益急短兵日接曹景宗頓鑿峴不進但耀兵遊獵而已上遣馬仙琕救義陽仙琕知義陽危急盡鋭決戰一日三交皆大敗而返御史中丞任昉奏彈景宗上以功臣寢而不治臣燾曰人有百金之資尚知高其柴援厚其門牆况有萬乘之國而不知愛之者乎故屛翰之地無事時尺寸不可以與人而况多事之時可數棄之哉江左自元嘉之後股肱肘臂之地失亡幾盡要所存惟義陽爾義陽之地外通淮汴內連荆揚彼此津要行師之道義陽存則壽陽可復壽陽復則兩淮可收義陽失則非惟絶兩淮南望之意抑亦為建康後日之憂此國家之禍男機女運夫復何疑而梁之將不救梁之主不問棄以豫人不甚顧惜夫兩淮失三齊又失義陽區區江左百孔千創補治之不暇何以圖人梁之不競有自來矣臨川王宏帥諸將伐魏至洛口兵敗而還天監四年冬十月上大舉伐魏以揚州刺史臨川王宏都督北討諸軍事尚書右僕射栁惔為副宏軍于洛口五年夏四月庚戌魏以中山王英為征南將軍都督揚徐二州諸軍事帥衆十餘萬以拒梁軍丁巳魏以度支尚書邢巒都督東討諸軍事戊子徐州刺史王伯敖與魏中山王戰於陰陵伯敖兵大敗己酉將軍藍懷恭與魏邢巒戰于睢口懷恭敗績懷恭復於清南築城巒與楊大眼合攻之九月癸酉拔之斬懷恭臨川王宏以帝弟將兵器械精新軍容甚盛軍次洛口前軍克梁城諸將欲乘勝深入宏性懦怯部分乖方魏詔邢巒與中山王英合攻梁城宏聞之懼召諸將議旋師己丑夜洛口暴風雨軍中驚臨川王宏與數騎逃去將士求宏不得皆散歸棄甲投戈填滿水陸臣燾曰知其術之不才而用之者謂之狂不知而用之者謂之愚狂愚之人敵之福也故魏之將為柏直而漢高喜袁紹之將為顔良而魏武喜汝州之守為元平而希烈喜孱君庸主自賢其臣以資敵人固無足怪而梁武以英傑之資與臨川親兄弟間平居相處固知其不為才而况當開國之始興問罪之師此敵人所以伺候以為進退四方之所觀望以為去就其舉也不可謂之輕武帝不以屬之韋裴龍虎之將而付之頑嚚不友之弟使百萬之師一朝烏散若敵人乘之則社稷存亡或未可議嗚呼棄民則不仁資敵則不智知其不可而為之則為狂君子是以知梁之不永蓋武帝之智荒矣魏攻鍾離為韋睿所敗六年春魏中山王英與平東將軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人於邵陽洲西岸為橋立柵數百步跨淮通道英據南岸攻城大眼據北岸立城以通糧運城中衆才三千人昌義之督帥將士隨方抗禦魏人晝夜苦攻分番相代墜而復升莫有退者二月魏主召英使還英表願賜寬假魏主復賜詔兵久力殆亦朝廷之憂英猶表稱必克魏主遣步兵校尉范紹詣英議攻守形勢紹見鍾城堅勸英引還英不從上命豫州刺史韋睿將兵救鍾離受曹景宗節度旬日至邵陽睿於景宗營前二十里夜掘長塹植鹿角截洲為城去魏城百餘步比曉而營立魏中山王英大驚以杖擊地曰是何神也大眼將萬騎來戰睿以強弩二千一時俱發洞甲穿中矢貫大眼右臂大眼退走明旦英自帥衆來戰一日數合英乃退師魏師復夜來攻睿不許軍中驚睿於城上厲聲呵之乃定上命睿等為火攻之計睿使馮道根與廬江太守裴邃秦郡太守李文靜乘鬭艦競發擊魏洲上軍盡殪别以小船載草灌之以膏從而焚其橋風怒火盛煙塵冥晦敢死之士拔柵斫橋水又漂疾倐忽之間橋柵俱盡軍人奮勇呼聲動天地魏軍大潰英見橋絶脫身棄城走大眼亦燒營去諸壘相次而崩悉棄其車甲爭投水死者千餘萬斬首亦如之臣燾曰善戰者小挫益厲小勝益急小挫益厲所以出敵之不意小勝益急所以乘敵之不支昔者項羽之東漢人追之不復顧盟薛仁杲之走唐人追之不復援師以為施刃之勞既已一克則破竹之勢固當盡解南人分裂迭相攻討南人以百萬之師潰之洛口江揚危懼荆襄震怒此天以梁賜魏也魏人不知乘鋭挫堅守城不進使韋裴之徒得徐為之計反為所勝棄甲投戈奔走不暇此天以魏賜梁也梁人固當乘之不可失矣出吳越之甲發淮泗之衆間出其後直趨馬頭柴險道塞歸道使魏之匹馬不復北還而元英之徒矜甲麾下乘破英之勢席卷而前威震內外自江以北無立草矣惜其君臣之志止於退敵失此機會遂無恢復之期武帝使董紹還魏通好魏主不從七年正月初魏主遣中書舍人鮦陽董紹慰勞叛城白早生襲而囚之送於建康魏主既克垂瓠命於齊茍兒等四將之中分遣二人敕揚州為移以易紹移書未至上領軍將軍吕僧珍與紹言愛其文言於上上遣主書霍靈超謂紹曰今聽卿還令卿通兩家之好彼此息民豈不善也因召見賜衣物又謂紹曰卿知所以得不死今者獲卿乃天意也夫立君以為民也凡在民上豈可不思此乎若欲通好今以宿豫還彼彼當以漢中見歸紹還魏言魏主不從臣燾曰聖人治已而不求於敵使吾之法制常明將士常練積聚常厚上下常相親不可勝之備固常在我敵欲攻則與之進戰敵欲和則與之休息不攻不和固守以待和戰之端唱之者敵吾特因其來而應之則在敵者常汲汲在我者常有餘昔者秦閉關養威諸侯來攻則開而與之戰諸侯來和則取其地而聽其約秦之為秦蓋自若也而諸侯終不能自謀梁武帝當爭奪之際溺宴安談空虛徹去禁防而亟求於敵敵若不豫我又去備豈不為梁氏之大害故上䇿不若自治以待敵六朝通鑑博議卷八
