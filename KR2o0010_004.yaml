body:
  text: 六朝通鑑博議卷四宋李燾撰桓温復取壽春五年六月桓温聞趙亂出屯安陸遣諸將經營北方趙揚州刺史王浹舉壽春降征北大將軍禇裒上表請伐趙即日戒嚴直指泗口七月帥衆三萬徑赴彭城北方士民降者日以千計朝野皆以為中原指期可復光禄大夫蔡謨獨謂所親曰滅胡誠為大慶然恐更貽朝廷之憂耳其人曰何謂也謨曰財殫力屈智勇俱困安得不憂及朝廷乎魯郡民五百餘家相與起兵附晉求援於禇裒裒遣部將王龕李邁將銳三千迎之趙李農帥騎二萬與龕等戰於代陂龕等大敗皆没於趙臣燾曰善用兵者先為不可勝以待敵之可勝不可勝在我可勝在敵劉石之難天下剖分元帝南渡之後披荆棘立朝廷祀晉配天以復武帝之業為元帝者其亦先為不可勝之計以保江東者乎西取蜀北取壽春中取襄陽則江東之業固矣况壽春之地密邇建康此尤晉之所急者自元帝改元即位至穆帝永和之五年蓋三十有餘載而壽春始復有智之士莫不遲之臣謹按伏滔正淮論壽春者南引荆汝之利東連三吳之富北接梁宋平途不過七百西援陳許水陸不出千里外帶江湖内保淮淝號為要害故王用之則王伯用之則伯賊得之則天下不安漢魏之際劉鋹以之而叛王凌以之而叛諸葛誕母丘儉以之而又叛五代時南唐劉仁瞻嬰城拒守周世宗連年用兵僅能克之至是徙郡治於下蔡誠以彼壽春者宜取而在我不當棄而予敵敵方强以此而守敵旣衰以此而攻則壽春之於江東其為藩籬之蔽厚矣可不重哉故臣於此而精言之禇裒北伐後趙其將王龕敗於代陂裒遂引還見前段臣燾曰天下之兵非難用也患乎無釁之可乘天下之釁非難乘也患乎無人之可使故不得衞霍則漢不能誅匈奴不得李郭則唐不能討禄山今虎之亡諸子爭立誠夷狄之大釁也中原父老跋踵相望傒王師之至則相與扶攜而歸之使晉得賢將如衞青去病子儀光弼輩舉江南精銳之卒以與夷狄之衆一戰而決則晉之復興也必矣穆帝在乳褓豈真有撥亂之志哉但以裒居后父之尊欲其總中外之任誇服天下耳宗社之興廢生靈之休戚初不是計也代陂之敗狼狽而歸長夷狄滋蔓之勢辜四方向義之心裒亦無以逃其罪也用殷浩以抗桓温七年八月初桓温聞石氏亂上疏請出師經畧中原事久不報温知朝廷仗殷浩以抗已甚忿之然素知浩之為人亦不之憚也以國無他釁遂得相持彌年雖有君臣之跡羇縻而已八州士衆資調殆不為國家用屢求北伐詔書不聽十二月温拜表輙行帥衆四五萬順流而下軍于武昌朝廷大懼浩欲去位以避温臣燾曰古之人君之用人疑則不任任則不疑未有用而不任任而復疑者也桓温之才果可用乎果不可用乎可用卽不當疑之不可用則不當任之初何充薦温於朝廷旣獲大用伐蜀之役温有成績矣朝廷恐其權勢太盛又用殷浩欲以抗温傳曰見利害之謂王擅生殺之謂王以一人之尊御千官百辟之衆予奪自我廢置自我何止為是紛紛者哉浩之不能抗温則温愈難制使浩而果能抗之則是温雖廢矣又生一温也昔韓信彭越皆非漢之純臣方其才之可用則高祖列王爵付兵柄委以伐楚之任而不疑及其有罪則又從而誅之不赦未聞以一人抗一人也後之人主欲御其臣當以漢高為法謝尚北伐獲傳國璽以歸大司馬桓温欲有事中原使謝尚率衆向壽春尚之行也使建武將軍濮陽太守戴施據枋頭㑹冉閔之子智與其大將蔣幹來附復遣行人劉猗詣尚救止猗求傳國璽遣㕘軍何融率壯士百人入鄴登三臺助戍譎之曰今且可出璽付我當遣丹使馳白天子聞璽已在吾許必遣軍相救幹乃出璽付融融齎璽馳還枋頭尚遣振武將軍胡彬率騎三百迎璽致諸京師臣燾曰晉之與五胡爭者吾中國之境土爾一傳國璽何足云哉方冉閔之亡而慕容儁之奮然燕魏交爭干戈不解蓋亦可圖之機也謝尚旣遣其兵渡河而北矣僅得其傳國璽以歸君臣相賀遽有得色豈不為識者之笑耶晉之祖宗披荆棘蒙霜露寸攘尺取以創百年之業何啻此一璽乎璽之未歸而正朔相承衣冠所在四海之内皆仰於晉誠不待此一璽而後重也光武起兵至廣阿披輿地圖曰天下郡國若是而止得其一奈何天下之未定光武之所恥也於是平蜀平齊平河北平關中而漢以中興憲宗即位之初披圖數貢亦慨然嘆曰天旣全與予有家予不能事事何以見郊廟則藩鎮之未服憲宗之所恥也於是平蜀平夏平淮西平山東而唐以中興使晉之君臣其心愧恥以五胡未滅為憂以境土未復為念枕戈嘗膽不忘於襲讎則中興之功雖光武憲宗不能專其美矣殷浩北伐㑹姚襄叛浩敗績於山桑九年九月姚襄屯厯陽廣興屯田訓厲士卒殷浩惡其强盛屢遣刺客刺之刺客皆以情告襄襄益疑懼十月殷浩自壽春帥衆七萬北伐欲進據洛陽修復園陵吏部尚書王彪之上㑹稽王昱牋以為未應輕進不從浩以姚襄為首驅襄引兵北行度浩將至詐令部衆夜遁隂失甲以邀之浩聞而追襄至山桑襄縱兵擊之浩大敗臣燾曰用兵非難養其氣之為難也惟按甲休兵將帥無輕敵之志則投石超距士卒有敢死之心故用其兵不可不養其氣養而未充尚不可輕用况不養而用之得不謂之棄其師自元帝南渡至穆帝永和之末晉之君臣一知有以養其氣則三四十年之間國可富矣勢已成矣兵可舉而用矣五胡雖强其不足以抗吾必矣祖逖旣没之後祖約用河南則敗庾亮戍邾城則又敗庾翼取丹水則又敗禇裒戰代陂則又敗殷浩出山桑則又敗非晉之不能敵胡非南人之不可用於北惟其威令不振敗亡相尋兵未用而氣已索矣然五胡之於晉有戴天之讎詎可一日忘之耶為晉之計莫若内撫三流外撫淮甸次取巴蜀張吾形勢然後命忠勇之將專務養士以全其氣俟北人有釁則起而乘之晉可興而胡可滅矣惜乎晉之君臣不知計之出此故臣於浩之敗而併論焉桓温伐秦至灞上十年三月秦王健遣丞相雄淮南王生等帥衆五萬軍于嶢以拒桓温四月温與秦兵戰于藍田秦淮南王生單騎突陣出入以十數殺傷晉將士甚衆温督衆力戰秦兵大敗轉戰而前直進至灞上秦主健與老弱六千固守長安小城悉發精兵三萬以拒温三輔郡縣皆來降温撫諭居民使安堵復業民爭持牛酒迎勞男女夾路觀之耆老有垂泣者曰不圖今日復覩官軍臣燾曰智者之謀所以多不及成者非其才之不若人失在於先私後公反以害其智耳如桓温最為失天下之勢者謂上流不可不防故先取蜀謂淮淝不可不保故取壽春上流旣固淮淝旣安於是名北向以問夷狄之罪及其至灞上也兵勢大振秦人折北不支三輔耆老喜見官軍相與垂泣牛酒相勞觀者如堵亦足以見中原之人未忘於思晉而温威令所及足以使鐻耳之衆氊裘之民膽折氣喪而不敢與之爭矣奈何咫尺長安不渡灞水藏姦挾詐為王猛所窺其心術不正故其大功不成於此而可見也如温之智如温之善用兵使其姦詐之謀化為忠義必安國家必定社稷則再造晉室其功可與周之方虎等矣惜夫先一己之私計後天下之大義失此之勢勝秦遂為不討之賊可不悲乎桓温討姚襄至洛陽十二年故魏降將周成反襲洛陽姚襄自許昌攻之踰月不克長史王亮諫曰忠挫力屈或為它冦所乘襄不從桓温自江陵北伐八月温至伊水姚襄撤圍拒之温結陣而前親被甲督戰襄衆大敗襄奔于洛陽温追襄不及襄後欲圖關中帥衆伐秦兵敗為秦所殺臣燾曰天下之事責之於其始不責之於其末桓温舉兵北向洛陽討姚襄之罪而終不得襄之要領臣不以此責温而責之於殷浩蓋姚弋仲之死顧謂襄曰今石氏已滅中原無主我死汝便歸晉當竭盡臣節無為不義之事則襄之來降固欲遵父之訓盡忠於晉室殷浩何至疑之以生其不義之心乎昔漢髙祖之用韓彭英布其駕御英豪之術固未易言至於曹操之待人蓋亦有可論者操之表封漢壽亭侯也非不知其無乆㽞之意方其與張遼言則俾之吐情實之問以探其心待其既歸於劉則任之使去操又與袁術爭而吕布降于操操非不知布之必貳於術也方其與陳珪言則使之設養鷹之喻以安其意待其既通於術則誅之不疑使襄之才可用必盡禮以待庶幾借其力以立功如其可殺則必俟其有過然後加之以兵何所不可如此則襄雖欲叛而無名矣襄屯厯陽未有過舉浩不能恢廓度量以容天下之士而乃命刺客懷匕首乘間殺之若其果能殺襄則天下之英雄亦將望望而去矣孰肯與浩同其功名耶故臣備論其事亦系之桓温云謝萬矜豪傲物未嘗撫衆率軍入渦潁以禦燕衆遂驚潰狼狽而歸升平三年十月謝萬軍下蔡以激燕萬矜豪傲物但以嘯詠自高未嘗撫衆兄安深憂之謂萬曰汝為元帥宜數接對諸將以恱其心豈有傲誕如此而能濟事也萬乃召集諸將一無所言直以如意指四坐云諸將皆勁卒諸將益恨之安慮萬不免乃自隊帥以下無不親造厚相親托旣而萬帥衆入渦潁以援洛陽郄曇以病退屯彭城萬以為燕兵大盛故曇退即引兵還衆遂驚潰萬狼狽歸軍士欲因其敗而圖之以安故而止詔廢萬為庶人於是許昌潁川譙沛諸城皆没於燕臣燾曰兵法云將者民之司命國家安危之主也民之死生國之安危皆係於將則將之任其可輕乎故人主必務於擇將而為將必先於撫士提百萬之軍驅之鋒鏑之下彼忍自輕其生而樂趨於死哉撫而育之則親而不離愛而勉之則信而不疑雖死與死雖危與危士卒爭其命而敵人始不抗矣楚子之一言撫軍三軍之士皆如挾纊吳起親吮士卒之疽士欲以死報之誠以將帥之職不可一日不撫其衆穆帝一用謝萬而許昌潁川譙沛諸城盡舉而棄於燕君不擇將將不撫士之過也西晉以浮虚而亡元帝之興不能痛懲其弊徃徃復用浮虚之人餘風相煽至於穆帝又委萬以方靣之任可謂循覆車之轍而不悟矣四海分爭豺狼滿天下如萬之清談嘯詠則當束之高閣不任以政可也况使之俯順荒餘選才易務幾何而不敗乃翁事耶彼士卒之衆古人視若赤子惟恐不得其懽萬獨矜豪傲物畧不加意初未遇敵衆散而歸其得免於死幸矣後之為將者當以萬為戒朝廷聞燕主儁卒以中原可圖桓温曰慕容恪尚在憂方大耳四年正月燕主儁疾召大司馬太原王恪受遺詔輔政而卒太子暐卽位二月以王恪為太宰專錄朝政恪雖綜大任而朝廷之禮兢兢嚴謹虚心待士咨詢善道量才授任人不踰位官屬朝臣或有過失不顯其狀隨宜他敘不令失倫唯以此為貶時人以為大愧莫敢犯者或有小過自相責曰爾復欲望宰公遷官邪朝廷初聞燕主儁卒皆以為中原可圖桓温曰慕容恪尚在憂方大耳臣燾曰桓温畏夷狄之盛而不憂晉朝之無人此可怪也使為相者得一裴度則曰賊未授首臣無還期為將者得一霍去病則必曰匈奴未滅何以家為如此則五胡不難制矣君父之讎不難復矣自司馬氏有國何晏為浮虚之端嵇康王衍和之於後天下之士相與景慕而爭効之莫不清談笑傲悠然自得甚者酣飲狂歌以為逸被髮裸體以為高至於天下休戚國家存亡畧不加省陵夷至於東晉而此風未衰雖王導謝安號為江左之偉人氣習所熏未能除去况其餘者哉光極之變琨華之變麻秋之變中原亦多故矣而不知有以圖之亦足以見晉之無人也浮虚之風煽於天下而天下無一可用之才故臣因桓温之言而併論晉之風俗桓温伐燕引舟自清水入河郄超曰清水入河難以通運不若盡舉見衆直趨鄴城温不從至枋頭而敗海西公四年春三月大司馬温領徐兖二州刺史四月温帥步騎五萬自兖州伐燕六月温至金鄕天旱水道絶温使冠軍將軍毛虎生鑿鉅野引汶水㑹于清水引舟自清水入河舳艫數百里郄超曰清水入河難以通運不若直趨鄴城彼必望風逃潰若能出戰則事可立決但恐明公以此計輕銳勝負難必則莫若頓兵河濟控引漕運資儲充備至來夏乃進兵雖如賒遲然期於成功而已捨此二䇿而連軍北上恐於時有所憂非獨無食而温又不從七月温至枋頭暐及太傅評大懼謀犇和龍吳王垂曰臣請擊之若其不捷走未晚也暐乃以垂帥衆五萬以拒温暐遣請救於秦堅從之八月遣洛州刺史鄧羌帥步騎二萬以救燕初温使豫州刺史袁真攻燕梁譙開石門以通水運真克譙梁而不能開石門水運路塞九月燕范陽王德屯石門斷温糧道温戰數不利糧儲復竭又聞秦兵將至自陸道犇吳王垂曰俟其士衆力盡氣衰然後擊之無不克矣乃帥八千騎徐行躡其後温果兼道而退數日垂告諸將曰温可擊矣乃急追之及温於襄邑范陽王德先帥勁騎四千伏於襄邑東澗中與垂夾擊温大破之斬首三萬級秦茍池邀擊温於譙又破之死者復以萬計温收散卒屯于山陽深恥喪敗乃歸罪於袁真奏免真為庶人真遂據壽春叛降燕臣燾曰用兵之法用衆者用其情用寡者用其氣衆則易驕故立法以制其情寡則易怯故先聲以作其氣昔漢光見大敵勇非真勇也所以作其不怯之氣見小敵怯非真怯也所以起其不驕之情若光武可謂善變矣故能全勝於天下分裂之時以晉鬭胡强弱之加何啻十萬桓温若能用郄超之謀張已之聲勢乗敵之昏亂壯吾士之心警敵人之氣則晉師雖弱猶可與戰而遷延不進形沮氣屈使燕秦合而圖之敗無餘屨矣枋頭之敗袁真不能開石門水運路塞桓温深恥其敗歸罪於真奏免真為庶人見前段臣燾曰一國之將智者可為天下之將非有道之士不能勝其任識四方之形勢決兩陣之勝負此天下智者舉而知之而不矜功不諱過犯而不校容天下之衆與共立天下之大功此固非有道之士不能為也昔者諸葛亮祁山之役諸將自用違其節制馬謖敗于街亭趙雲退于箕谷此豈主帥之過哉而亮布所失於中外求箴規於羣下故民忘其敗師以復振若亮可謂有道者矣桓温晉之名將也平蜀平洛陽威震關中智可謂有餘矣而枋頭一敗何足為温之辱温若能引咎責躬秣馬厲兵以為後圖則今日之敗未必不為後日之勝何必深諱其過移罪它人以至顛沛豈非智有餘而道不足歟秦取梁益又取彭城襄陽烈宗寧康元年冬秦王堅使王統朱彤帥卒出漢川毛當徐成帥卒出劒門入冦梁益梁州刺史楊亮拒之兵敗彤遂抜漢中徐成攻劒門克之十一月秦遂取梁益二州卭筰夜郎皆附於秦四年二月先是秦王堅遣長樂公丕石越等帥步騎七萬冦襄陽梁州刺史朱序以秦無舟檝不以為虞旣而石越帥騎浮渡漢水序惶駭固守至是秦克襄陽執序送之長安四月秦梁州刺史韋鍾圍魏興太守吉挹於西域抜之吉挹引刀欲自殺左右奪其刀秦人執之挹不言不食而死秦王堅曰周孟威不屈於前丁彦逺潔已於後吉祖沖閉口而死何晉氏之多忠臣也臣燾曰晉之危急未有甚於此時者苻堅旣滅燕定蜀并秦涼下西域以天下不一為恥方且睥睨江南據我益土今年取彭城而掠我淮泗明年取襄陽而徇我漢沔張大形勢以為後日進取之規不四年而兵果南向則堅之用意巧矣其謀深矣夫何故自蜀之失而晉之上流無援又失彭城則左顧而勢危又失襄陽則右顧而勢迫向非苻堅舉百萬之兵聚為一道投之淝水則其為晉之患豈易量也哉六朝通鑑博議卷四
