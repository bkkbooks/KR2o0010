body:
  text: 六朝通鑑博議卷一宋李燾撰序論臣燾曰博議之作臣敢言之自古帝王之一天下必先為勝天下之具君者勝負之主地勢民心兵將事機皆其具也凡欲善其事必先備其具况於制敵國一天下而可亡其具乎聖人初起妖氛未清則借險於地繫本於民寄力於兵取謀於將決勝於機而後可以言戰雖以黄帝之神湯武之聖亡具而戰不能制敵若地險而便民恱而附兵勁而義將勇而賢機至而乗信能行此五者而以德先之則可以全天之所付而無敵於天下矣江南六朝冒矢石而戰者雖有其兵授斧鉞而出者雖有其將至於曰地曰民曰機臣未見其能兼之也吳蜀相應如左右手劉氏有蜀而孫氏不得之李氏有蜀而司馬不得之尉遲逈入蜀而梁陳不得之惟劉宋蕭齊雖有梁益而不能合東西之勢以誅拓跋故曰不得其地三國鼎分與夫南劉而降中原之人知有二魏絶意南顧惟晉元帝以司馬子孫渡江而東遺民故老堡塢相望爭迎官軍中流擊楫又有祖逖當是時大河以南皆為晉有乃以戴若思繼之失民望矣故曰不得其民以至謝𤣥淝水之勝王鎮惡關中之勝陳慶之河南之勝又皆有其機而不能乗因循鹵莽嘗試為之而歸勝負之數于天其亡具甚矣臣因思江左之地自吳至陳各據形勢為自固之術然三百年間或謀慮失當或機㑹失時或事宜失斷又於五者之具皆不能兼此其所以終不能混一區夏臣旁採裒類而為之說非謂專取其長蓋欲詳言其失監彼之失而求吾之所以得或庶幾焉昔西漢名士如賈誼賈山徐樂輩每論國大事皆取秦為說彼非不知逺引唐虞三代以為高則於當時之事機疎而不近曷若取其近於時機者而論之取其失者而監之則於謀謨為有補矣臣是以集其事實起自東漢建安五年至陳祥明二年遇有所見則表而出之各為之說名曰六朝制敵得失通鑑博議合為百篇離為十卷雖其管見不足以上裨天聽而思竭毣毣一為聖主精言之者欲成有志復古之功而盡一介愛君之念耳總六朝形勢論臣燾曰自吳主孫權卜宅江南以至東晉宋齊梁陳皆祖相仍襲以為國都其間邊防之要害可得而論吳之備魏東晉之備五胡宋齊梁之備元魏陳之備高齊周隋力不足者守江進圖中原者守淮得中原而防北冦者守河摭而言之莫不有說吳有强敵無上岸之情陳之國勢已弱不能進取故其所守止於江自晉迄梁惟宋武帝守河其餘皆保淮為固或守淮西或守淮北或守淮南若夫江之所守吳紀陟所謂西陵至江都凡五千七百餘里險要必爭之地不過數四東晉以後謂荆江揚為三流是也至於守淮則淮西之鎮莫大於垂瓠淮北之鎮莫大於彭城淮南之鎮莫大於壽春而沿河之地曰洛陽曰虎牢曰滑臺曰碻磝亦又分為四鎮大扺守河而不能則守淮西淮北守淮西淮北而不能則守淮南畫守長江則不足道東晉祖逖旣死之後諸將守淮至宋武帝東平廣固西定關中始於河南列兵置守其後滎陽嗣位元魏渡河侵四鎮之地一時陷没文帝頻年用師暫得而旋失之則其所守徒在於淮西淮北也迨明帝時薛安都以彭城叛常珍奇以垂瓠叛淮之西北遂為元魏所取則其所守又徒在於淮南也齊永元之際裴叔業又以壽春叛淮南之地復為元魏所取梁武帝旣復淮南厯侯景之亂其地没於高齊陵夷至於陳但以長江為境故陳氏無藩籬之固在六朝最為至弱無足怪者雖為六朝之君所守如此至於乗間攻取則亦不憚用兵吳之與陳雖皆守江吳圍合淝陳攻壽春所爭常在於淮甸東晉以還雖皆守淮晉討慕容暐梁宋元顥所爭亦在於河南然考其兵之所出不過二道一自建康濟江或指梁宋或向青齊一自荆襄踰沔或掠秦雍或徇許洛東晉之祖逖庾亮禇裒殷浩桓温謝𤣥宋之武帝檀道濟劉彦之蕭斌思話梁之韋叡裴邃曹景宗陳慶之之徒北伐之師不由於此則由於彼中原有釁則進兵冦盗方强則入守史䇿所載皆可知矣况夫江南地險其固可恃曹公破荆州之威水步八十萬猶喪師於赤壁其險固何如哉若夫東晉宋齊梁陳之君雖居江南中國也五胡元魏雖處神州夷狄也其事又與孫曹不同故五胡之盛無如苻堅其臣之賢則有王猛元魏之强無如佛狸其臣之賢則有崔浩王猛丁寧垂死之言以江南正朔相承勸苻堅不宜圖晉崔指南方為衣冠所在厯事兩朝常不願南伐苻堅違王猛之戒故有淝水之奔佛狸忽崔浩之謀故有盱眙之辱雖江南之險兵不可攻而天意佑華亦不可以厚誣其實况以神聖文武之德皇天眷命奄有四海為天下君合蜀吳之全力以恢復中原為不難矣吳論臣燾曰必有合天下之勢然後可以一天下三國鼎立曹氏據魏地廣兵强奄天下之半孫權以一隅之半則其勢力必不加於魏而君臣相謀連荆益之險合東西之勢以抗北方最䇿之得也嘗觀孫權之初滿寵在合淝而淮未屬吳先主武侯奄蜀漢而益未屬吳不得淮則無以拒北冦之入不得荆則無以固上流之勢不得益則無以為西土之援天下大勢分合不一則其力不全拒敵且不足安能以兼人哉故孫權擐甲冑冒矢石轉鬭合淝以為滿寵爭上流之地陸遜吕蒙相與贊其決以躡取荆州全據長江而命諸葛瑾等尋盟於蜀兩國之使冠蓋相望不絶於道凡其所以百戰經營與夫區區外交者皆求於合東西之勢進圖北方耳蓋江南之所長而北人之所忌者皆在於此以諸葛亮之雄出而為天下興復漢室亦以跨有荆益結好孫氏天下有變荆襄之兵向宛洛梁益之衆出秦川吳人渡淮以相犄角然後中原之地風撤席卷後無餘菑其後吳蜀之好睽而諸葛表論其事深以為恨則當時識者亦知天下大勢不可不合也曹操平生挾姦雄之資恃富强之利用兵制敵自謂無前而吳以荆州借先主操一聞之落筆於地蓋東西合吳蜀交魏之所甚不利也不然操矯情飾偽如此非大利害迫之何遽爾耶則北人之所忌者於此而可見以吳之所長攻魏之所忌則南北之勝負不待戰而決臣謹按魏之攻吳凡三大戰戰而輙敗者何哉南人之勢或合於荆或合於蜀用東西全力則可以制敵而取勝方曹操舉數十萬之衆順江東下劉豫州收合餘燼兼舉江夏水陸俱進而周瑜因之破曹公於赤壁以曹公之雄奉頭鼠竄以歸于魏而不敢與之角則是吳合於荆而一勝之也先主旣破夏侯淵曹公西援漢中而荆州兵威震於華夏曹公議徙許以避其銳而不知為之計則是荆合於蜀而再勝之也諸葛亮祁山之役三郡響應關中震動明帝西鎮長安而陸遜因之走曹休於石亭賈逵力爭疾救僅得曹休之歸則是吳蜀合三勝之也使吳蜀之地約從締交首尾相應如此三戰而摩之以歲月操雖强亦未必不為吳蜀所吞惜乎合淝為敵有而不敢取西蜀藉外交而不能固是以止於自守而不圖進取之功孫權坐此有志而無成嗚呼吳蜀合則進圖中原而有餘吳蜀分則自守其地而不足天下形勢較然甚明後之有天下者版圖所有旣得吳蜀之全不必力戰以爭連衡以取而形勢之地盡為我有則非復昔日三國之吳矣若能以此進圖北方混一區宇為孫權之所不能為者豈不偉哉故臣因吳之艱難孫權之經營而備論東西之形勢云孫權初起董襲曰江東有山川之固小大用命張昭秉衆用事襲等為爪牙此地利人和之時也漢獻帝建安五年冬十月曹操聞孫䇿死欲因喪伐之侍御史張紘曰乗人之喪旣非古義若其不克成讎棄好不如因而厚撫之操即表權為討虜將軍領㑹稽太守太夫人以權年少委張紘與張昭共輔之太夫人問揚武都尉㑹稽董襲曰江東可保不襲曰江東有山川之固而討逆明府恩德在民討虜乗基小大用命張昭秉衆用事襲等為爪牙此地利人和之時也萬無所憂臣燾曰自古英雄據天下之勢則必并天下之謀以議其攻守處形便控險阻此為攻守之圖也攻守之事非勇不能決非智不能全此二者皆人謀也而足以增山川之重示形勢之制則爭天下者必借險於地取謀於人而後能大有所成就矣吳越之地長江大淮險陿四顧孫權君臣相與畫江而守之抗二大敵未嘗困折人皆謂地形之便而不知人謀之巧也魏文臨江喟然發有人之嘆而六師遽旋噫是豈特孫權之力亦股肱爪牙相與合謀内守外禦而敵人莫敢抗耳蓋自周瑜為之破曹公陸遜為之抗巴蜀以激江南之氣而攻取方力築濡須之塢設武昌之城以全江南之備而守禦方固諸葛瑾尋盟張溫報聘以通江南之援而和好方講噫用江南一方之地或攻以兼敵或守以拒冦或和以息民皆有人出為之謀故無一不如其志嗟乎舉賢任能保守江東孫權至是不負討逆之託矣至其末孫有一陸抗而羊祜王濬睥睨不敢進一日抗溘死揚越之阻長江之固自若也而晉兵長驅如涉無人因知爭天下之術地勢雖强以人為重故臣因董襲之言先尚論其人而徐議攻守和好之得失於後命周瑜破曹操於赤壁建安十三年七月曹操南擊劉表㑹表卒子琮為嗣九月操至新野琮降操進軍江陵曹操遺權書曰今治水軍八十萬衆方與將軍㑹獵於吳權以示羣下莫不響震失色時周瑜受使至鄱陽肅勸權召瑜還瑜至見權曰瑜得精兵五萬自足以制之願將軍勿慮權撫其背曰公瑾卿言至此甚合孤心孤當與孟德決之遂以周瑜程普將兵與昭烈并力逐操與操遇於赤壁初一交戰操軍不利瑜部將黄蓋曰操軍方連船艦首尾相接可燒而走也乃取蒙衝鬭艦載燥枯柴灌油其中裹以帷幕上建旌旗豫備走舸繫於其尾先以書遺操詐云欲降時東南風急蓋以十艦最著前中江舉㠶餘船以次俱進操軍吏士皆出營立觀指言蓋降去北軍二里餘同時發火火烈猛船徃如箭燒盡北船延及岸上營落頃之煙炎張天人馬燒溺死者甚衆瑜等率輕銳雷鼓大進北軍大壞臣燾曰取天下必先定攻守之計而時有以制其變攻則示敵以不足而使之莫能測守則示敵以有餘而使之莫能加自古英雄欲有事於天下而未得志者必先守以待時守之之術必有以逆折其鋒使勝氣在我懼心在敵則有所畏而不敢加彼有不敢加之心吾有不可犯之勢則守必固矣孫權於吳用守計也而赤壁之役則出於攻議者謂孫權攻守本無定計而不知赤壁之攻所以佐其守也曹操在魏地大兵衆二袁董吕皆為撲滅乗勝􅗄然欲徑渡長江氣吞吳㑹意其必來南也一大治之則終身創矣若不力拒而逆折之使得氣去彼勇我懼歲來相持則吳之勢力必不支矣故周瑜魯肅贊孫權之決力拒曹公於赤壁使之終身有所懲艾雖屢至盱眙恫疑虚喝而不敢進非其懲前日之敗故耶至於魏文慨然渡江一謀來伐則羣臣並起而爭之辛毗止廣陵之役鮑勛止淮上之役蔣濟止沓渚之役亦以有餘待吳而不敢蹈前日覆轍耳故終魏文之世無大戰爭赤壁之功不止却曹公於一時而可以拒魏師於再世豈不偉哉借荆州以拒曹􅋵建安十四年十二月權以魯肅為奮武校尉肅勸權以荆州借昭烈共拒曹操權從之臣燾曰濟大事不可無權拒大敵不可無黨權以集黨則國可保而天下可圖漢以齊地假韓信吳以荆州借昭烈二者皆天下之大權也當楚漢間非韓信不可敵羽而三國時非昭烈莫能當操者魯肅嘗說昭烈使撫表衆同心一意共治曹操而收功於赤壁矣今日於荆不可用權植黨以守之耶向使齊地不在韓信則必為楚所有荆州不在昭烈則必為魏所爭與其在楚魏以資敵孰若分之豪傑以植黨哉又况雲夢偽遊則地終入於漢益陽交語則荆州卒分於吳則曩時所以假韓借劉者不過權以濟事耳區區周瑜知割土地以業英雄之為失而不知借土地以役英雄之為得也良平躡足於漢魯肅建議於吳信天下智謀之士所見畧同也曹操徙濱江州縣近内以避吳兵建安十八年曹公恐江濱郡縣為權所畧下令内移民轉相驚自廬江九江蘄春廣陵户十餘萬皆東渡江江西遂虚合淝以南惟有皖城臣燾曰用兵之法使人備已則權在我使已備人則權在敵在我而後可以進戰退守戰國時諸侯以五倍之地十倍之衆共抗一秦秦人開關延敵諸侯之師逡巡遁逃爭割地以奉秦而秦人欲戰不已是秦嘗執諸侯之權故能散其從約而并吞之秦人以此而攻孫權以此而守江東一方抗魏拒蜀内外禦之不暇而又歲歲出師拔皖口襲蘄春而數圍合淝豈其守禦誠有餘力耶蓋示之以不憚形之以好戰使魏之疆場鰓鰓焉畏而備矣則吳之權重故曹公慮其見掠而徙江西之衆滿寵畏其來伐而遷合淝之城以曹公之雄滿寵之畧尚畏而避之則其所守豈憂不固茍不先之則魏必知吾所欲者在守所憚者在戰歲出重兵臨江而扼之則吳之力困於備魏而不得休息矣安能致曹公滿寵之畏哉後之有國者當使人備已而後可以希孫權之守云周瑜請并吞梁益據襄陽以圖北方建安十四年周瑜詣京見權曰今曹操新敗憂在腹心未能與將軍連兵相事也乞與奮威俱進取蜀而并張魯因畱奮威固守其地與馬超結援瑜還與將軍據襄陽以䠞操北方可圖也權許之奮威者孫堅弟子奮威將軍丹陽太守瑜也周瑜還江陵為行裝道病卒於巴丘臣燾曰天下之大勢全據之則强三國時天下之大勢在襄陽吳蜀之要害而魏之所以必爭也蜀為天下足重關劒閣險阨四蔽而不可以圖逺吳為天下首山川阻深士卒剽悍而不能亡西顧之憂襄陽者天下之脊也東援吳西控蜀連東西之勢以全天下形勝使魏來伐擊吳則蜀掣於西擊蜀則吳牽於東而襄陽通吳蜀之援以分北方之勢擊襄陽則吳蜀並起而救之使魏可攻則吳軍厯江淮蜀軍撼秦隴而襄陽之衆直指中原則許洛動揺而天下可定是瑜之謀不特為今日固守之地而亦異時混一之資也不幸瑜没孫權不能推漢文思賈誼之心施行其䇿而用吕蒙繼之梁益陷於蜀襄陽歸於魏而吳自全於一隅至破蜀師於猇亭而命諸葛瑾向襄陽則天下之勢已分而不全嗚呼吳蜀襄陽全據於一則江南可量哉徙治建業十七年九月初張紘以秣陵山川形勝勸孫權以為治昭烈東過秣陵亦勸權居之權於是作石頭城徙治秣陵改秣陵為建業臣燾曰自古都邑本無定勢爭形勢之便而據其衝為根本之圖則居其要英雄之圖天下未必用權而爭其便終必定計以固其本以江南論之武昌居兵之衝建業為地之要孫權力爭荆州上流之形勢猶未定也據江夏臨魏蜀塞西北之衝圖全楚之利故都武昌以爭荆州不過權時之宜爾至用吕䝉襲荆州無復上流之慮於是時而不都秣陵以據㑹要非王業也秣陵之地因山為壘緣江為境山川形勝氣象雄偉以秦皇之强處秦雍據崤函而猶眷顧秣陵昭烈之雄徘徊其地以為都邑之勝處則其形勢可見孫權從張紘之請定建康之都内以固江外以援淮而江南之根本不可拔矣自孫權始基東晉以後仍而不改以重兵戍石頭以宗室鎮京邑而建業嘗為江南都邑之地是孫權根本之固不止利一時而規模之逺又可為五世法噫孫權之法可通於五世而不能貽末孫之謀遽從歩闡徙都武昌自以為從先王居也而不知武昌者孫權以爭形勝非以為子孫無窮之基蓋以揚越之民泝流而給餉則不便於兵以人主之重近敵而建都則不便於國而危隘不足以容萬乗塉埆不足以贍一師而遽爾移都故南人有言曰寧還建康不止武昌夫地形不便人心不與而欲為王者之都可乎若委建業居武昌是以秦皇蜀主之智不如一步闡也以孫權經營數世之業而委之諸葛靚疎矣陸抗丁寜還都建業最䇿之得也不幸抗没無與攻守悲夫作濡須塢吕蒙聞曹操欲東兵說孫權夾濡須水口立塢諸將皆曰上岸擊賊洗足入船何用塢為蒙曰兵有利鈍戰無百勝如有邂逅敵步騎蹙人不暇及水其得入船乎權曰善遂作濡須塢臣燾曰有必守之地有必爭之地守者在我爭者在敵勢若不同而皆有根本之地以為戰守之資而後進退有所仰高祖之所守者關中也而身在滎陽成皋間不與楚角以限制項羽使不得西侵光武之所徇者燕趙也而命冦恂守河南馮異軍河上以防遏它兵令不得北侵項羽不西侵而後關中可守它兵不北渡而後燕趙可取雖取守不同皆外據根本之地而徐為之計於内此高光取天下之術也孫權在吳命陸遜等鎮武昌建業而身禦魏兵於濡須塢使不得進而我得以乗隙投間圍合淝襲壽春武昌建業必守之地也壽春合淝必爭之地也濡須塢者根本之地也中據濡須以為根本而後在我者可守在敵者可爭此高光之術而孫權使充其志天下可定矣六朝通鑑博議卷一
