body:
  text: 六朝通鑑博議卷三宋李燾撰孫權集衆建業揚聲將北伐魏王基䇿其必不能出已而果然八年吳主大發衆集建業揚聲欲入冦揚州刺史諸葛誕使豐安太守王基䇿之基曰今陸遜等已死孫權年老內無賢嗣中無謀主權自出則懼內釁卒起癰疽發潰遣將則舊將已盡新將未信此不過欲補綻攴黨還自保護耳已而果不出臣燾曰孫子談兵之雄而其法以知彼知己為要知己欲其自治知彼欲其乘釁彼已之勢自治為先敵之力雖敝而吾力不全敵之政雖亂而吾政未修則方自憂之不暇何暇以謀人魏之末世亦多變矣孫權之出亦屢出矣而終無大功豈其勢有所不可耶蓋孫權以公孫淵之忿耗甲兵於外而力屈於太子亮之愛動國本於內而政亂吳之羣臣如陸遜等皆已前死自出則無與鎮守遣將則不足倚仗雖發兵動衆揚聲示武而內方汲汲故王基以無謀主而知其不能出王昶以放良臣知其可以攻凡吳之所短魏之良臣皆已窺見而何暇以乘魏之釁哉唐藩鎮强杜牧以自治為上䇿臣謂非特唐之上䇿乃吳之至計其或繼吳者雖百世而下治已攻人之術無以易此諸葛恪大破魏兵於東興嘉平四年十月王昶胡遵母丘儉等各獻征吳之計朝廷以三征計異詔問傅嘏嘏對列船津要堅城據險橫行之計其殆難捷唯有進軍大佃最差全牢可詔昶遵等擇地居險審所措置及令三方一時前守奪其肥壤使還塉土司馬不從十一月詔昶等三道擊吳太傅恪將兵使冠軍將軍丁奉與吕據為前部奉斫魏前屯吕據等繼至魏軍驚擾散走爭渡浮橋橋壞絶自投於水死者數萬臣燾曰輕敵則無成玩兵則無震吳自孫權經營百戰以成江南基業至于建興凡幾歲矣諸葛恪之智安可望孫權萬一孫權用師於强盛之時而恪舉事於政衰之後動兵於竭力之時頻年動衆以與敵國東興之築淮南之戰敵一不損而徒殘其兵消其威至晉師之來兵疲威消無以禦之推原所自恪之罪也陸抗言西陵國之西門建衡三年夏抗上疏曰西陵建平國之藩表處下流受敵二境若敵泛舟順流舳艫千里星奔雷電俄然行至非可恃援他部以救倒垂也臣父遜昔在西陵國之西門雖云易守亦復易失若有不守非但失一郡則荆州非吳有也如其有虞當傾國爭之臣燾曰全天下之勢者可以攻固天下之交者可與守方孫權之時蜀有重險之固吳有三江之阻合此二長并於一國則形勢益張攻守兩利分而有之則唇齒不相附首尾不相應江南汲汲常有西北之憂矣昔者周瑜用於吳而欲取劉璋甘寧用於吳而欲取張魯皆欲全天下之勢以為進取之資也孫權信被髮入山之語召還周瑜逮蜀既定而勢分矣天下之勢既不能全則孫權命世之英諸葛亮一時之傑約從締交相與為一以共苦魏魏之强猶可移於吳蜀矣諸葛亮張溫冠蓋相望不絶於蜀亦何意乎固天下之交以為保守之計也而孫權因荆州之嫌稱臣於魏絶好於蜀以自斷其右臂使魏從劉曄之言度江徑襲蜀攻其外魏攻其內不知孫權何以善其後其後世陸抗臨死以西方受敵為屬而不能用也故羊祜王濬藉上流之勢大舉而亡之臣常思吳之爭天下上䇿莫如全天下之勢中䇿莫如固天下之交最下自守而已始不用周瑜以無蜀而自守終不用陸抗以無蜀而至於速亡後之有天下者據吳奄蜀大勢已合而不藉外交則可以為孫權之所不能為者矣東晉論臣燾曰臣嘗論晉元帝恭儉之主而無撥亂之才王導醇謹之臣而無經世之略故其能中興於江左而不能中興於天下者厥有由哉方元帝渡江之初石勒石虎造舟葛陂將攻建康哆然有吞噬之志既而霖雨彌時士卒饑疲乃相與憂懼退而議降使元帝有撥亂之才王導有經世之略舉江南之衆練精畢力以與勒虎決其勝負勒虎危迫勢當就擒勒虎擒則劉聰膽破矣當此之時藩鎮之將如葛組劉遐蔡豹郭默城塢之主如陳川樊雅張平馮寵皆為晉守導若遂勸元帝承中興思晉之心進兵河北奚患其不能中興於天下哉在晉之臣獨一祖逖擊楫中流鋭而欲逞導又不資之以尺寸之刃斗升之糧及逖之兵勢已强成效已著黃河之南皆為晉土固宜命逖總領方靣以卒其功何至以戴淵統之此逖所以飲憤至死而歎其功之難成也元帝雖賢主王導雖忠臣獨知其無意於用兵故處置乖方遽至於此然東晉君臣不欲出攻則已矣至於守禦之計亦有所未盡昔吳主孫權嘗擇羣臣忠赤可倚者使守江陵又命吕蒙築濡須口身自將兵而守其塢塢在晉之厯陽城以上流之勢不可不重水道之衝不可不防故也東晉以王敦鎮荆州蘇峻守厯陽敦叛於元帝之時而峻反於成帝之世導身相此兩君既不能攻之於前又不能守之於後更一大變幾至亡國孰謂導為有謀乎其後庾亮移鎮石城蔡謨以為不可庾翼移鎮樂鄉王述以為不可殷浩求經略中原王羲之以為不可桓溫請遷都洛陽孫綽以為不可雖庾亮庾翼殷浩桓溫終無成功亦由晉之君臣畏怯過甚務相循習是以羲之蔡謨孫綽之徒爭為茍安之計不欲用兵至苻堅淝水之敗謝安叔姪乘秦之亂可以有為中原矣已而趦趄不前夫王導謝安皆東晉偉人其設心措意不在於北伐餘子碌碌又奚足責使五胡之於晉遂為不討之讎可不痛哉石勒初窺江南紀瞻破之孝懷帝永嘉六年二月石勒築壘於葛陂課農造舟將攻建業琅邪王睿大集江南之衆於壽春以紀瞻都督諸軍以討之㑹大雨三月不止勒軍中饑疲聞青軍至集衆議之張賓曰晉之保壽春畏將軍往攻之耳彼聞吾去喜於自全何暇追襲吾後邪勒攘袂鼓髯曰張君計是也引兵發葛陂遣石虎帥騎二千向壽春遇晉運船虎將士爭取之為紀瞻所敗瞻追奔二百里前及勒軍勒結陳待之瞻不敢擊退保壽春臣燾曰夷夏之强弱常決於其始形勢未成則可以震而取根本既堅則難以力而拔東晉之初劉聰首難階此而石勒據趙慕容據燕苻堅據秦五胡之亂相仍百年蓋不折於始而使盛於終方勒虎之來夷狄之兵初未窺於江南也及入冦壽春造舟葛陂而勝負未決則夷夏之强弱未見南北之形勢才成而又雨潦四集羽書狎至羣胡憒眊不知所為刁膺欲降䕫安欲避張賓欲去此亦有危急未定之際也乘其未定以重兵壓之生中國之氣威夷狄之心使勒虎氣奪則必成擒勒虎擒則劉聰震懾不敢再舉矣惜其集衆壽春不能大舉使勒歸取河北降祖約攻襄陽中夏愈怯夷狄愈强而南北之志遂成矣祖逖北伐後趙留鎮雍丘自河以南皆歸于晉愍帝大興元年祖逖鎮雍丘數遣兵擊後趙後趙屯戍漸蹙候騎常獲濮陽人逖厚待遣歸咸感逖恩德率鄉里五百家降勒又遣精騎萬人距逖復為逖所破勒鎮戍歸者甚多逖愛人下士雖疏交賤𨽻皆恩禮遇之自河以南多叛後趙歸于晉臣燾曰强者以攻為攻智者以守為攻出而攻敵非力有餘者不能坐而役敵非智有餘者不能以力鬭力力有所盡則勢有所窮不如以智鬭之可以致敵而坐受其利當晉氏渡江之初祖逖欲舉離散之衆以荒破之地與石勒爭勝敗於河南若出而與之鬭是以肉餧虎何益不如撫人民務耕桑修守戰之具內固根本以待其來使勒自困其兵自耗其財而吾初無勞也我常逸敵常疲內不失所以為國外可以破勒此非智者孰能為故河南之地皆歸于晉自孫氏立國於南以吕蒙陸遜之豪雄不敢上岸輕議其地至於桓溫之材幼度之量宋武之威宋文之强收復河洛敗亡相繼其失皆在於不務內事馳逞於外為人所擾卒不能安故六朝之際欲守河南無善於逖之守也惜夫祖逖之知守而不知變當河南之初復國弱兵少敵勢方强此可以坐而役敵當河南之已安兵强士附河北之人回首望救此可以出而攻敵而逖專守一道不能乘機自用其强遷延不進身死無功石勒遂為脫網之冦可不惜夫元帝以戴淵統祖逖逖怏怏發憤而卒四年豫州刺史祖逖以戴淵吳士雖有才望而無洪致逺識且已翦荆棘收河南地而淵雍容一旦來統之意甚怏怏又聞王處仲與劉刀有隙將有內亂知大功不遂感激發病九月卒於雍丘豫州士女若喪父母臣燾曰人主之駕御英雄必有以全之而後可以求成大功蓋英雄之所為事出於已則欲已之專其名才高於人則惡人之出其右淮隂之恥與噲等為伍蕩冦羞與黃忠同列漢抑淮隂而激其叛蜀全蕩冦而獲其功祖逖與晉披荆棘冒風露尺攘寸取以復河南故土而王導以戴淵一旦雍容直據其上而節制之是艱難之際而逖盡其力而平定之後則淵居其利故逖以感憤而其功不終噫以逖之氣節豈肯低首撫襟碌碌從戴淵後者王導遽以加之抑英雄之氣沮進取之謀非䇿也祖約之為人才能不及中人而輕以河南付之兵折地喪以敗國家事嗚呼於逖則抑之已甚於約則用之太過委任非當以復河南王導至此疏矣祖約鎮壽春不得開府頗怨望後趙來攻屢表請救朝廷不為出兵顯宗咸和元年七月豫州刺史祖約自以名輩不後郤辨而不豫顧命又望開府復不得遂懷怨望十一月後趙石聰攻壽春祖約屢表請救朝廷不為出兵祖約曰是棄我也益懷怨恚臣燾曰役人於艱難之地則必先與之同休戚置人於疑忌之域則不可與之守要害要害之地國家根本所繫不可輕以許人祖約以河南瘡痍之餘當石趙豹虎之衆而爵命不優緩急不救則約必怨而大臣必疑以朝廷之臣疑邊疆之將則中外必不相應最用兵之大忌也故石勒得以襲取祖約約降而河南轉為趙矣趙人屢攻陷襄陽晉輒復取之陶侃使桓宣鎮襄陽趙攻之不克顯宗咸和七年秋趙郭敬南掠江西太尉侃遣南中郎將桓宣乘虛攻樊城悉俘其衆竟陵太守李陽攻新野拔之敬懼遁去桓宣遂拔襄陽侃使宣鎮襄陽宣招懷初附簡刑罰略威儀勸課農桑或載鉏耒於軺軒親帥民藝穫在襄陽十餘年趙人再攻之宣以寡弱拒守趙人不能勝臣燾曰晉帝于南趙僭于北兩國相持盡力所爭者襄陽而已三年之間趙再復晉兩復誠以襄陽之去江陵步道五百江陵者晉之上流而襄陽者江陵之蔽襄陽失則江陵危則晉不得高枕而卧矣此晉之所以必爭也知以襄陽為守者必知以襄陽為攻蜀漢前將軍自襄陽攻樊城曹公倉皇失措議遷都許以避之誠以襄陽之地北接宛洛兵自此可以潰中原之腹心雖曹公之善用兵有不能抗者然自蜀而用襄陽則地勢猶有所未便至於晉都江東西取襄陽以此下兵於中原如轉石於千仞之山此趙之所必爭也夫居必爭之地惟智而謀者可以取勇而寬者可以守勇則能拒敵寬則能撫衆故桓宣招懷新附民心一固趙人不敢飲馬于沔而襄陽始定于晉矣庾亮欲移鎮石城蔡謨以為不可咸康五年四月亮上疏言蜀甚弱而胡尚强欲帥大衆十萬移鎮石城遣諸軍羅布江沔為伐趙之規帝下其議丞相導請許之蔡謨議以為時有否泰道有屈伸茍不計强弱而輕動則勢不終日何功之有胡若送死則敵之有餘若棄江逺進以我所短擊彼所長非廟算之勝也朝議多與謨同乃詔亮不聽移鎮臣燾曰蘇峻之亂庾亮有以召之晉之宗社若綴旒然成帝情鍾渭陽遂免誤國之戮復使握兵上流居方靣之任不惟因失政刑亮亦無恥甚矣為亮之計既不能杜門省愆則必以功補過所謂功者非激切生事以僥幸其萬一者也茍能綏靖邊陲而固吾圉則亦可謂功矣亮又不然遽欲移鎮石城妄意興復貪毫髮之利生戎狄之心孰謂亮而有謀乎石城之不可徙者非謂兵之不可復出夷狄之罪不可復討也蓋其移鎮之際當石虎方强之時以亮而當虎如以肉而投豺狼也况石城小戍無益於虎存亡耶使亮有報國之志欲立功以刷前憤則必按甲休士蓄財務農待其糧食既豐士卒之氣既盈而虎有可乘之勢一舉而滅之不在遷鎮也昔漢高祖定天下使韓信平齊平燕平趙光武中興使耿弇平關中吳漢平蜀四方之地度其可取則移兵取之不聞諸將有徙鎮之事如亮之兒戲也幸而有蔡謨之議其事遂止亮不自悛未幾而為邾城之役終不免於敗雖然亮用於朝廷則致藩鎮之兵用於邊境則啓夷狄之亂易曰小人勿用必亂邦也亮之謂矣庾亮使毛寶戍邾城趙人攻陷之初陶侃在武昌議者以江北有邾城宜分兵守之侃每不答而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦冦者正以長江耳邾城隔在江北內無所倚縱有兵守之亦無益於江南及庾亮鎮武昌卒使毛寶樊峻戍邾城趙王虎遣䕫安帥石閔張貉等二萬騎攻邾城九月石閔敗晉兵於沔陰張貉陷邾城死者六千人臣燾曰武昌臨江與黃岡相對邾城在黃岡東南百三十里耳吳能城而守之晉雖城之而不能守何也吳孫權初都武昌黃龍之初始遷建業命陸遜輔太子留鎮於鄂則建業武昌為吳東西二郡矣武昌在江南邾在江北相距一水之際吳嘗都武昌則邾不可不守晉不以武昌為都則邾非晉之所急也又陸遜戍邾之歲在魏齊王芳即位之二年當吳魏虎爭而芳以幼童涖事政出多門是不能抗遜堂堂之鋒矣至庾亮之鎮武昌則石虎方强有吞噬之志而亮以清談禦之其能免於敗乎夫晉以清談之亮而取非所急之邾又以犯石虎之强敵豈可以陸遜之事同年而語耶若夫毛寶者良將也因是而並棄之惜夫燕使劉翔至建康勸晉公卿先從事巴蜀七年二月慕容皓即燕王位皓自以未受晉命乃遣長史劉翔來獻功論捷二月翔至建康帝引見翔將行公卿餞于江上翔謂諸公曰今石虎李壽志相吞噬王師縱未能澄清北方且當從事巴蜀雖有智者不能善其後矣中護軍謝廣曰是吾心也臣燾曰取天下者必知勢之所先所遇之時不同而所用之勢亦異漢高祖唐太宗之先關中漢光武之先河北魏武帝之先山東皆勢也先得其勢者强不得其勢者弱奕之為數小數耳尚有爭於勢况今取天下不知其所當先耶晉永嘉之亂元帝渡江而東天下之勢在蜀夫取蜀之利內可以固荆楚荆楚固則江東之勢安外有以擾關輔關輔擾則北方之力分我安而彼分則天下之事濟矣故取蜀者天下之至計也當此之時胡强而蜀弱取蜀以制胡莫此之便而江東君臣不急取蜀以固根本區區從事於所不當先者遂使天下之至計不出於朝廷大臣之論而出於慕容使者之言晉為無人矣不能成混一之勢宜哉桓溫伐漢遂定巴蜀之地穆宗永和三年二月桓溫軍至青衣三月溫至彭模留參軍孫盛周楚守輜重自將步卒直指成都三戰三捷溫軍至成都之十里陌漢王勢悉衆出戰袁喬督士卒力戰遂大破之溫乘勝長驅至成都縱火燒其城門漢人惶懼無復鬭志勢輿櫬靣縛詣軍門溫解縛焚櫬送勢於建康封歸義侯臣燾曰嘗讀孫子兵法曰用兵譬如率然率然者常山之蛇也又讀桓溫傳諸葛八陳圖曰此常山蛇勢夫孫武諸葛號善用兵而溫號善知兵者臣因其論而有所得蓋吳為天下之首蜀為天下之尾而荆楚為天下之中擊其首則尾至擊其尾則首至擊其中則首尾俱至是常山之蛇不獨論兵為然而因地勢以行兵者蓋亦似之三國之時吳自吳耳蜀自蜀耳吳孫權蜀孔明尚欲合兩國之力以抗北方况堂堂之晉方圖恢復之舉而不知其有以用吳蜀耶東晉有國首尾百餘年亦嘗數用其兵兵之至于河南不過三焉祖逖之討石勒桓溫之討慕容俊劉裕之平姚泓是也逖之兵出於武帝建興之元年是時李氏已有矣故逖拔前㚄尾無巴蜀之援而終以無成穆帝永和三年桓溫取蜀至十年而溫入洛陽安帝義熙九年劉裕入蜀至十三年而裕克長安吳蜀之援相為應接因是以圖中原無復牽制之慮又嶷嶷若可以立非常之功者蓋逖雖晉之賢將以無巴蜀故不能守河南曰溫曰裕雖取益州至於區區之忠義視逖則慙德多矣故得中原而旋失之惟其得蜀據吳命忠義之將如祖豫州者付之外閫又何患中原之不能復乎六朝通鑑博議卷三
