body:
  text: 六朝通鑑博議卷七宋李燾撰魏主在瓜步遣使求和請婚江湛曰夷狄無親許之無益元嘉二十七年十二月庚午魏主至瓜步壞民廬舍及伐葦為筏聲言欲渡江建康震懼上登石頭城有憂色謂江湛曰北伐之計同議者少今日士民勞怨不得無慙貽大夫之憂豫之過也又曰檀道濟若在豈使胡馬至此上又登莫府山觀望形勢募魏主及王公首許以封爵金帛又募人齎野葛酒置空村中欲以毒魏人竟不能傷魏主不飲河南水以槖駝負河北水自隨餉槖駝名馬并求和請婚上遣田奇餉以珍羞異味得黃甘即噉之并大進酃酒左右有附耳語者疑食中有毒主不應舉手指天以其孫示奇曰吾逺來至此非欲為功名實欲繼好息民示結姻媛宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧奇還上召太子劭及羣臣議之衆並謂宜許江湛曰戎狄無親許之無益竟不成婚臣燾曰兵者天下之所共惡強天下之所惡從一人之所欲民必違之無民將誰與戰故古之謀其敵者必先惡之於其民城濮之役楚欲戰而晉辭焉所以使民之惡楚也楚是以敗邲之役晉欲戰而楚辭焉所以使民之惡晉也晉是以敗宋文河南之師父戰死于前子鬭死于後厭兵之心可謂甚矣魏人以偃兵息民之意來告於宋其誠與否雖未可必若不從焉則無厭之過將在文帝不如從之因其間合餘燼收遺民撫摩訓練其終能不變吾將何求如其自變則吾民必怒彼衆必懈以方怒之勢攻已懈之心則勝負不待戰而決文帝不行此道疾衆以爭曲在我矣其何以勝魏主攻旴眙不克退走二十八年春正月魏人過山陽不敢留因攻盱眙魏主就臧質求酒質封溲便與之魏主怒築長城一夕而成魏人以鉤車鉤城樓城內繫以彄絙數百人唱呼引之車不能退既夜縋桶下卒出截其鉤獲之明日又以衝車攻城城土堅密每至頺落不過數升魏人乃肉薄登城分番相代墜而復升莫有退者殺傷萬計尸與城平凡攻之三旬不拔會魏軍中多病疫或告以建康遣水軍入淮又敕救彭城斷其歸路二月丙辰魏主燒攻具退走十一月青齊大擾長沙王義欣在彭城將佐大恐勸義欣委鎮還都義欣不從辛酉以義佐為豫州刺史鎮壽陽臣燾曰南北分立幾三百年地土之形廣狹不齊人民之性勇怯不一南之不能抗北五尺童子皆明見之矣北人三用其兵於南三大敗焉以曹公之智困於赤壁苻堅之盛敗於淝水佛狸之勇走於瓜步其勝負之理幾不可以勢論以為上流得失勝負所在者是一論也水土之性有所不同者是一論也攻守之技各有所長者是一論也是皆言其勢而未達其理臣以為師欲恐故理欲直使吾無所慊於敵而敵有所愧於其衆曲直之理一分勝負之形自見故曹公懷吞漢之意二袁二劉張繡吕布天下雄俊禽滅殆盡又復舉兵臨江意欲并臣孫劉無厭之心其孰能忍江南君臣寧有戰爾而不為之下吳人一怒孫劉齊奮而操不得不走矣是雖據上流之勢割長江之半而何足以勝吳司馬劉氏雖微弱不振而禮義之主正朔所在四方萬里所共尊仰苻堅佛狸恃其犬羊之衆欲盡臣南北之民中國而無人則可矣使其稍有知識誰忍甘為左衽故江左之人或戰或守共出死力所不敢辭晉宋一怒士民俱憤而秦魏不得不敗矣雖使雜兩淮之衆持久攻之具而何足以勝晉宋故彼此之辭異而曹困於孫華夷之義分而秦敗於晉魏屈於宋三者之敗非敗於兵而敗於理故欲戰者先申其理以怒其士晉避楚師非弱也懼楚人之怒耳漢數羽罪非強也欲漢民之怒爾士以氣怒方可與戰蓋所以戰者氣也理直則氣奮曲則氣沮理有所屈衆何足恃而土地之廣狹人民之強弱又何足言區區焉求之於末其或未之思云臣因瓜步之戰所以備論其理魏人瓜步之役破南兖徐兖豫青冀六州殺掠無餘二十八年魏人凡破南兖徐兖豫青冀六州殺掠不可勝計丁壯者即加斬截嬰兒貫於槊上盤舞以為戲所過郡縣赤地無餘春燕歸巢於林木魏之士馬死傷亦過半國人皆尤之上每命將出師常授以成律交戰日時亦待中詔是以將帥趦趄莫敢自決又江南白丁輕進易退此其所以敗也自是邑里蕭條元嘉之政衰矣臣燾曰古人并天下者必有勝天下之計將良士勇所當必破非上兵也轉戰終日闢地千里非上兵也此不足以勝天下固也勝天下有道傾其敵而已傾其敵有道反其政而已故君猶水也水因地而制流君因敵以制政使吾之善日聞敵之惡日著則勝負之意當有所在故劉項之相持袁曹之相敵項專為暴而劉專為義袁專為亂而曹專為整而天下卒皆歸於劉曹故彼所不為我所必為此所以勝天下矣當南北分裂之時北敵雖強犬羊之性尚未革也兵鋒所過屠戮殆盡豈人之所忍為此殆天所以資劉氏而使之為計文帝固當反其所為用齊頃越踐之䇿以撫摩其人民而擇大臣如羊祜祖逖者以鎮撫其邊鄙布德惠行忠信使逺人欣之如此數年愚將見宋臣之憤惟恐上之厭兵而河南北之餘民憂王師之不出也而文帝不行此道糜爛其民疾戰以爭所行之事與索虜無大相過者政均而勢不敵宜乎反為人之所勝也江南白丁輕進易退見前段臣燾曰古之善用兵者能移民之性而用之五方之性怯勇不齊而善用者能使之為一秦人徑晉人悍當輕用之吳人脆蜀人懦當重用之昔者武侯之用蜀用以法孫權之用吳用以將為節制之師不動如山攻掠如火故對魏而蜀人不敗遷潘吕之徒將如龍虎士有所恃故對魏而吳人不敗移吳蜀之人為秦晉之性兵家之用至此而後神矣宋文當攘奪之際用輕脆之衆而欲爭勝負於中原其所用之將何人哉提不教之卒坐作不齊進退不一將怯而士亂以當秦晉之鋒喪師不亦宜乎上攻河南劉興祖謀欲長驅中山直搗心腹上意存河南不從元嘉二十八年三月上聞魏世祖殂復謀北伐訪於羣臣太子中庶子何偃以為淮泗數州瘡痍未復不宜輕動上不從沈慶之固諫北伐上以其異議不使行青州刺史劉興祖上言以為河南阻飢野無所掠脫諸城固守非旬月可拔愚謂宜長驅中山據其關要冀州以北民人尚豐兼麥已向熟因資為易向義之徒必應響赴若中州震動黃河以南自當消潰臣請發青冀七千兵將領之直入其心腹云云上意止存河南亦不從臣燾曰為國之道知攻者強知守者安備敵之所不必攻空勞其民與不守同得吾之所不能守自耗其兵與不攻同南北相持之際河北固不可攻蓋其地逺雖攻而得之必不得守河南亦不可攻蓋其地平雖得之而守之必不固劉氏父子欲爭難守河南再舉再敗猶不知悔復圖進取可謂不知所攻矣而劉興祖為之謀欲長驅中山直搗心腹不知當時之兵力能遂一舉掃清河朔乎如其未能雖得中山聚兵積糧前有堅敵後有繼援其能久存乎以秦人之強不能越韓以取綱壽以元魏之盛不能越淮而取鍾離况新造之國而可以輕議人之腹心乎文帝之攻河南固為失矣而興祖之計亦未為得也其君臣之謀如此乖繆將何以圖人蕭思話再伐魏無功而還秋八月諸軍攻碻磝治三道張永等當東道申坦等當西道崔訓當南道攻之纍旬不拔八月辛亥夜魏人自地道潛出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毁崔訓攻道張永夜撤圍退軍不告諸將士卒驚擾魏人乘之死傷塗地蕭思話自往增兵力攻旬餘不拔是時青徐不稔軍乏食丁卯思話命諸軍皆退屯歷城臣燾曰國小而數用兵禍莫大焉中人之家有十金之産而欲與萬金之子較其智術人皆知其必敗蓋其力未足以充其所為而輕與人爭是自困也南北之時較江南之兵不居北之一較江南之地不居北之五以五一之地十一之兵養威積力十年而後動必勝而後舉猶懼其不能全焉可輕用之以僥幸其或成故文帝在位不三十年而七用其民一取秦三取周四取魏屢舉而屢敗故文帝之計是自攻之道也孝武惡荆江揚強大遂分之三州因此虛耗武帝孝建元年初晉民南遷以揚州為京畿穀帛所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大將居之三州户口居江南之半上惡其強大故欲分之乃分揚州浙東五郡置東揚州治會稽分荆湘江豫州之八郡置郢州治江夏太傅恭議使郢州治巴陵尚書令何尚之曰夏口在荆江之中正對沔口通接雍梁實為津要由來舊鎮根基不易既有見成浦大容舫於事為便上從之既而荆揚因此虛耗尚之復請合二州上不許臣燾曰治國如治身心腸四體將養調治緩急各自有序人失其序則疾生之國失其序則亂生之古之人蓋憤焉是故漢都關中而重梁唐都關中而重鳳翔舉七國之衆不足以敵梁舉天下之衆不足以敵關中此漢之所以處鳳翔之勢足以蔽唐之西門京師之府兵足以制天下之藩鎮此唐之所以處勢也內外重輕各有其體此其所以能有天下晉氏南遷以揚州為腹心荆江為臂肘積貨財聚甲兵使之常重勢當然也當無事之時使強藩悍將內有所畏當有事之際使腹心屏翰外有所恃此實經久不易之道而劉氏父子偷目前之利破長久之規文帝虛內事外而江州之文武罷武帝強支弱幹而荆揚之勢分其後明帝之亂會稽遂為賊境而朝廷所保僅百餘年齊之末蕭氏弟兄亦欲聯郢雍以圖天下虛心腹肥支體遂為後世深患可不戒夫薛安都常珍奇等降魏遂失淮西四州及淮北之地魏慕容白曜又攻陷三齊太宗泰始二年徐州刺史薛安都益州刺史蕭惠開梁州刺史栁元憂兖州刺史畢衆敬豫章太守商孚汝南太守常珍奇並遣使乞降上欲示威淮北命沈攸之將甲士五萬迎薛安都蔡興宗曰安都歸順此誠非虛正須單使尺書今以重兵迎之藝必疑懼或能招引北冦為患方深考之國計尤宜馴養上不從安都聞大兵北上懼遣使乞降於魏皆請兵自救魏遣尉元孔伯恭出東道救彭城西河公石張窮奇出西道救垂瓠張永沈攸之進兵逼彭城彭城幾陷而元使安都守彭城自將兵擊永絶其糧道三年永等棄城夜遁元邀其前安都乘其後大破永等於吕梁之東死者以萬數枕尸六十餘里永與沈攸之僅以身免上聞之召蔡興宗以敗書示之曰我愧卿甚由是失淮北四州及豫州淮西之地二月無鹽常欣肥城糜溝垣苖等戍皆不附於魏魏遣長孫陵等將兵赴青州慕容白曜將騎五萬為之繼援白曜至無鹽中夜部分三月甲寅旦攻城食時克之將攻肥城酈範曰肥城雖小攻之引日勝之不能益軍勢若飛書告諭縱使不降亦當逃散白曜從之城果潰白曜謂範曰此行得卿三齊不足定也遂取垣苖糜溝二戍一旬中連拔四城威震齊土臣燾曰天下之大一人之身也臂指壯股肱良而心腹得安得為之慮宋高祖南向而王雖江揚千里之地以為心腹而亦恃青齊兩淮臂肘相用有以救吾之急而為敵之後虞安危之地在於此矣孝武若能計上世之事順武文之迹並建親賢以守要害則雖有強暴之敵尚未有窺覦之患也而乃不信忠臣不親宗族以地與賊使為亂階者其任使非也明帝立又不悟忘山海之量較臣子之短既不能弱又不能強兩淮三齊相次淪胥斬刈臂肘棄以豫人頭足離落塊然獨處所以不死或有待爾其救敗非也江揚之勢遂弱而不振者是二主之罪也沈攸之既敗於吕梁上又遣擊彭城攸之固執以為不可上怒強遣之魏人以攸之前敗所喪士卒瘃墮膝行者悉還之以沮其氣攸之又敗三年五月上復遣中領軍沈攸之等擊彭城攸之以為淮泗方涸糧運不繼固執以為不可使者七返上怒強遣之八月壬寅以攸之行南兖州刺史將兵北出魏尉元遣孔伯恭帥步騎一萬拒沈攸之又以攸之前敗所喪士卒瘃墮膝行者悉還攸之以沮其氣上尋悔遣攸之等復召使還攸之引兵退伯恭追擊之攸之大敗臣燾曰將以戰敗而怯者庸將也輕於用敗兵重於用勝兵者賢將也常人之情挫則氣折敗軍之卒不可復用惟賢者為能激其敗而使之怒忿然有不能平之心則勃然有不可已之氣乘其氣而用之可以當十為將至此而後可以為善用兵馮異常敗於赤睂吳漢常敗於公孫述皆能因之以有成功蓋知所以激之耳沈攸之若乘吕梁之敗收合餘燼激厲士卒斷髮損冠以圖勝敗則前日之敗未必有不為今日之勝而救齊之命堅不欲行其志已折矣既而敵有俘馘之遺而三軍喪氣上下之心先已怯矣其何以戰再敗不亦宜乎魏將慕容白曜取青冀之地四年五月沈文秀守東陽魏人圍之三年外無救援士卒晝夜拒戰甲胄生蟣蝨無離叛之志乙丑魏人拔東陽文秀解戎服正衣冠取所持節坐齋內魏人執之去其衣縛送慕容白曜使之拜文秀曰各兩國大臣何拜之有白曜還其衣為之設饌鎖送平城魏主數其罪而宥之待為下客給惡衣蔬食既而重其不屈稍嘉禮之拜外都下大夫於是青冀之地盡入於魏矣臣燾曰地有逺而不可棄近而不必取非識天下之勢者不足與論此昔者秦棄韓而先取蜀漢棄胸奴而先取西域有欲利之心不爭於市而爭於野此固衆人之所不識蓋資富強益形勢為不可棄非智者固不能知當南北之際青齊之在建康土地迂逺形勢僻左或得或失若不足與於存亡宋武勤身殘民百戰而取之其意必有所見以為之蓋以為三齊富強裂其地足以肥國分其衆足以益兵天下無事可以搖幽冀由此以守則守可固由此以攻則攻可必此吳之左臂明帝斷以與敵無甚痛惜不知身之孤立而不能與人鬭也齊論臣燾曰高祖以豪傑之資擁江淮之阻君臣固守而拒北人當開國之始命良將守壽春因時制變堰水灌敵齊無亡矢遺鏃之費而北人之兵破敗困折不敢復進當此之時上下一心有意乎固守以待天命矣既而無故交兵遂妄開邊隙是猶有攻敵之志也以創業之君不為一定之計以遺子孫宜乎後世之不振延及海陵內有相謀不暇外侮而敵人拱手視之義不敢近以此益知正朔之國天意所同雖使國內無政猶或隂為佑助不使蛇豕之衆得輕肆毒於南也明帝承基雖材非上聖而其佐四朝厯內外其彼我之勢亦備知之矣當即位之初魏之孝文遷都用師自任己意君臣相圖父子自亂此可以出而乘之齊人熟視不知所為可謂不知攻矣使元魏無能觀兵於沔取其五都齊師閉壁而不可出可謂不知守矣既不能攻又不能守天啓魏衷自吐欲和之言齊若屈己先求於魏魏必欣然從之而吾得以休息於內而又不能和以緩敵齊之無謀可謂甚矣至於後世棄要害之地內之於敵又無足論嗚呼善觀國者不觀其強弱觀其所以用之者何如爾能用其強則強而不折能用其弱則弱而不危昔者湯之於葛文王之於昆夷越王之與吳漢祖之與項羽其初若屈終復能振蓋其當時之謀遵養時晦以待天命驕敵之志而去其備息民之力而養其全待機會之來而用之故能有成功齊之初雖若不振茍能屈志以紓敵養民以待時因江淮之險固用荆楚之剽悍行於天下何遽不若人哉惟其攻守之不當和戰之失宜故比之前代為衰弱焉魏冦壽陽鍾離垣崇祖擊破之建元二年正月魏將薛道標引兵趣壽陽上使劉懷慰作薛淵書以招道標魏人聞之召道標還使懷郡王嘉代之二月丁卯朔嘉與劉昶冦壽陽將戰昶西向拜將士流涕縱橫曰願同戮力以雪恥魏步騎號二十萬豫州刺史垣崇祖乃於城西北堰淝水堰北築小城周為深塹使數千人守之曰魏見城小以為一舉可取必悉力攻之以謀破堰吾縱水衝之皆為流尸矣魏人果蟻附攻小城崇祖肩輿上城晡時決堰水下攻城之衆漂墜塹中人馬溺死以千數魏師退走臣燾曰兵有氣機有地知氣之機可以戰知地之機可以守兵不必多地不必廣能使之必勝者用其機而已當齊之初造而索虜侵擾謀奪我要害之地謀為我腹心之病其除之故不可緩而當時勢力出兵逆戰則衆寡不敵分兵守城則氣勢不合故垣崇祖因水之勢利而用之用力少成功多不勞而走敵可謂能用其機矣六朝通鑑博議卷七
