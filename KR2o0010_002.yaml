body:
  text: 六朝通鑑博議卷二宋李燾撰命陸遜討平山越強者為兵羸者補户得精卒數萬人建安二十二年冬十月定威校尉吳郡陸遜言於孫權曰方今克敵臨難非衆不濟而山冦舊惡依阻深地夫腹心未定難以圖逺可大部伍取其精鋭權從之以為帳下右部督會丹陽賊帥費棧作亂扇動山越權命遜討棧破之遂部伍東三郡強者為兵羸者補户得精卒數萬人宿惡蕩除所過肅清臣燾曰地廣而後國富人衆而後兵強據形勢之便而無富強之利則必先有以廣之而後可以謀進取地小民貧則從事於易以自廣國富兵強則逞志於逺以求成秦惠王捨韓伐蜀兼其地收其財國勢強而後輕戰國諸葛亮置吳魏征南夷賦其金帛取其甲兵軍資富而後勸蜀主大舉夫秦蜀之利猶須自廣而後能有為則江南數郡之地不強於秦不後於蜀而揚越山冦依阻深地亦吳之巴蜀南夷也陸遜削平蕩滌取精鋭以益兵民兵衆民富然後圖逺則遜之用吳與秦蜀等充其所為可以兼并天下何止保固江東而已乎初魯肅常勸孫權輯睦荆州共禦曹操吕蒙以肅言為非是二十四年七月魯肅常勸孫權以曹操尚存宜與荆州輯睦協力同仇不可失也及吕蒙代肅屯陸口分土接境畏其有兼并之心且居國上流兵勢難久密言於權曰蜀君臣矜其詐力所在反覆不可以腹心待也今蜀所以未便東向者以至尊聖明蒙等尚存也今不於強壯時圖之一旦僵仆欲復陳力其可得耶權深納其䇿又聊復與論取徐州意對曰至尊今日取徐州操後旬必來爭雖以七八萬人守之猶當懷憂不如取荆州據長江形勢益張易為守也權善之權嘗為其子求昏於羽辱罵其使不許昏權由是怒及攻樊城吕蒙上疏乞分士衆還建業以治疾為名荆州必撤備兵而可襲也遂稱病篤權露檄召蒙還陰與圖計召陸遜代蒙遜至陸口具啓形狀陳其可取之要時擒于禁等人馬數萬糧食乏絶擅取權湘關米權聞之遂發兵襲荆州臣燾曰智者謀國必雜以利害借力於黨足以傾敵而其失也亦足以自傾酈食其謀於漢欲立六國後而分項羽之力而張良不可魯肅用於吳欲輯睦荆州以多曹操之敵而吕蒙不行蓋楚漢間諸侯視強弱以為去就使楚或強六國復撓而從則漢之事去矣漢強則為黨漢弱則為敵智者謀國而反益敵於衒弱之際豈可謂功哉吳魏交爭荆州中立進則拒魏退則病吳魯肅欲加撫輯與之同仇以蹙曹操操故可蹙也使荆州強以蹙操之術加之於吳則未知利害之所在也噫二子皆逐於利而不雜於害酈生之謀不可用於漢則魯肅之計豈得行於吳也吕蒙勸孫權襲荆州全據長江以張形勢見前段臣燾曰與國不可不交以全其力要地不可不守以張形勢權其輕重則交不固於形勢地力不大於勢而自制之與制於人利害亦相絶矣荆州地居上流吳之與國以為同處上流一心并力共治曹操若在所不爭矣不知吳之得荆重於得蜀蓋吳蜀之交未必固而荆州之地北出可以攻魏西出可以撼蜀置一猛將於前而自處於肘腋之下非算也譬如巨室使它人扼其門而守之以制户內之出入則自守之不暇而况以進取乎吕蒙陸遜相與決䇿下南郡襲荆州全據長江張大形勢以臨魏蜀雖有十操不能害吳之守孫子曰地有所必爭荆州者吳蜀必爭之地是役也吕蒙陸遜為暗合孫吳矣受魏封爵二十四年七月魏王操表孫權為驃騎將軍假節領荆州牧南昌侯權遣校尉梁寓入貢又遣朱光等歸上書稱臣於操稱説天命操以書示外曰是兒欲踞吾著爐火上邪陳羣等皆曰漢祚已終非適今日孫權在逺稱臣此天人之應殿下宜正大位復何辭哉操曰若天命在吾吾為周文王矣臣燾曰敵強必有以折其氣敵弱必有以驕其志強弱在敵而所以制勝在我孫權破曹公百萬之衆於赤壁非無英決之氣也而稱臣於文帝乞於交州恐懼震懾若不獲命後世皆以為孫權前勇後怯以至取辱而後改圖不知夫不折曹公則魏兵不創艾而吾之守不固不驕文帝則魏將不縱緩而吾之力不全折其鋭氣起其驕心皆有制敵之微意在焉而以取辱為慊其量固淺矣安足以為志天下者道哉昔高祖受羽之封勾踐為夫差之役皆蓄其力以待其變却抑士氣以激其憤使敵首兩端則我之辭直敵之氣衰矣故能以屈於一人之下而伸於萬乘之上取辱於今日而償怨於異時何獨於吳不能哉吳之稱藩於魏也兵未嘗一日加吳使吳因其暇時保養休息練兵秣馬俟其陳留王之怨起於內諸葛亮之兵攻於外鬭辭交汨疾起而躡之則天下可圖惜其能示弱以緩敵而謀之不深卑身以驕人而持之不久不忍憤憤之氣改元稱號臨江拒守以致魏兵今年入濡須明年入淮上又明年入渦口歲歲相持不暇休息以成大舉視漢祖越踐得無愧乎魏使邢正至吳吳之羣臣皆懷憤怨魏文帝黃初二年邢正至吳吳人以為宜稱上將軍九州伯不當受魏封吳王曰九州伯於古未聞也昔沛公亦受項羽封為漢王蓋時宜耳復何損邪遂受之吳王出都亭候正正入門不下車張昭謂正曰夫禮無不敬法無不行而君敢自尊大豈以江南寡弱無方寸之刃故乎正即遽下車中郎將琅邪徐盛謂同列曰盛等不能奮身出命為國家并許洛吞巴蜀而令吾君與正盟不亦辱乎因涕泣橫流正聞之謂其徒曰江東將相如此非久下人者也臣燾曰士氣之勇怯足以為有國重輕蓋兩家相持而恃士大夫以為之震而士大夫所以交於人者恃其氣之不懾氣之堅者可與守氣之忿者可與尊君而報怨地形雖微國勢雖削而士大夫之氣猛厲英決則雖賁育之勇不可得而奪使其委靡偷懦不能振立則山河之固索然無象可襲而取也三國鼎峙吳之勢力不加於魏天下所知也方魏使至吳銜王命奉九錫以天子之使自居也而張昭徐盛毅然直辭忿然不屈拊魏使而奪其氣雖曰孫氏權以濟事講好息兵而羣臣之氣慷慨奮發而不可抑君子於是知吳之不可終屈也魏將曹仁以步騎數萬向濡須人馬步涉困朱桓以為可破黃初四年曹仁以步騎數萬向濡須先揚聲欲攻羡溪朱桓分兵赴之兵未到而仁奄至時桓手下及所部兵在者才五千人諸將業業各有懼心桓喻之曰凡兩軍交對勝負在將不在衆寡今仁既非智勇加其士卒甚怯又千里步涉人馬罷困桓與諸君共據高城南臨大江北背山陵以逸待勞為主制客此百戰百勝之勢雖曹丕自來尚不足憂况仁等耶桓乃外示虛弱以誘致仁仁遣其子泰攻濡須城分遣將軍常雕王雙等乘曲船别襲中洲桓遣别將擊雕等而身自拒泰泰燒營退桓遂斬常雕生擒王雙臨陳殺溺死者千餘人臣燾曰制敵必以全力治力必以要地所謂要者至近而主於我者是也主於我則我逸而敵勞我靜而敵動一日之靜可以制十日之動百里之逸可以乘千里之勞此兵強也而客主逺近之勢則本乎地揚越形勢有長江大淮之阻可以坐而役敵國苻堅舉秦雍百萬之師臨淮淝而敗魏太武以回山倒海之力威至瓜步而返非晉宋之力大於秦魏特能以全制之耳曹公據荆州道江南順江東下勢若無吳矣不知驅中原士衆逺涉江湖兵雖未接客主之勢先見諸葛亮周瑜論之固已在其掌握中矣豈俟交戰赤壁而後判乎後雖數戰而未嘗一得志於吳蓋吳自處於至靜至逸之地而北人動衆不免於勞識者謂孫權於是能以全爭於天下矣朱桓濡須之捷其亦以孫權之術而料敵歟故臣因朱桓之言而論南北客主之勢魏主伐吳至廣陵欲以重兵牽引孫權而命别將超越江湖五年秋七月帝東巡如許昌帝欲大興軍伐吳辛毗諫曰今日之計莫若養民屯田十年然後用之則役不再舉矣帝不從留司馬懿鎮許昌八月為水軍親御龍舟循蔡潁浮淮如壽春九月至廣陵吳安東將軍徐盛建計植木衣葦為疑城假樓自石頭至于江乘聯綿相接數百里一夕而成又大浮舟艦於江時水盛長帝臨望歎曰魏雖有武騎千羣無所用之未可圖也帝御龍舟會暴風漂蕩幾至覆沒帝問羣臣權當自來否劉曄曰彼謂陛下欲以萬乘之重率已而超越江湖者在於别將必勒兵待事未有進退也大駕停住積日吳王不至帝乃旋師臣燾曰善戰者致人而不致於人善戰者形敵而不為敵所形自古君將皆欲用之於敵而拙於謀已往往未能用其智而反墮人之術中孫權不過江尺寸以致人而魏文果循潁浮淮以勞其衆設疑城以形敵而魏果臨江興嘆而返其君誘之使去軍出於魏而進退之權則制於孫權權之兵亦精矣魏文內不量己外不量敵欲以孫權之術施之於吳擁萬乘之重牽引孫權將以致之也重兵臨廣陵而命别將它道越江湖將以形之也孫權窺見其謀勒兵待事不復進退而魏之大兵空出而返魏文至此犯不韙之戒矣區區劉曄知吳之不入其計而不知其君已墮孫權之術中此古人所以致論於目睫也魏主再至廣陵臨江見波濤洶湧歎息而還六年八月帝以舟師自譙循渦入淮尚書蔣濟表言水道難通帝不從冬十月如廣陵故城臨江觀兵戎卒十餘萬旌旗數百里有渡江之志吳人嚴兵固守時大寒冰舟不得入江帝見波濤洶湧歎曰嗟乎固天所以限南北也遂歸孫韶遣將高壽等率敢死之士五百人於徑路夜要帝帝大驚壽等獲副車羽蓋以還臣燾曰敵國皆有以相制而不可以相勝惟勢有所長則能制人而不為人所制矣三國時曹公以智勝劉主以度勝孫權以勢勝曹公之智長於用兵劉主之度長於用人然以智鬭智謀均則相軋以人制人才等則相傾故曹公之智用兵若神而不得志於吳蜀劉主所仰以支二敵者一諸葛亮耳而不能加區區之仲達二國之技至此有所窮矣孫權於吳破曹公走先主魏蜀之強不得而加之豈孫權用兵征伐過曹公而羣臣皆出諸葛亮右耶獨據長江之大勢坐而制之西北自不敢動而能以短攻其所長耳曹氏父子常矜其衆而加兵於吳矣太祖一舉而舟焚於赤壁魏文再臨而城遍於武昌至廣陵之役覩江濤洶湧而為浮雲之章亦見其智力無所施於此矣其後曹真圍江陵而不拔臧霸攻洞口而不利曹仁辱於濡須曹休敗於石亭北之所恃者兵而兵加南則屈以其所長在南不在北也此非臆説諸葛亮謂北方之人不習水戰周瑜謂捨鞍馬仗舟楫曹操必破二公料於前故臣敢申言於後孫權使周魴譎挑曹休率兵向皖陸遜破休於石亭魏明帝太和二年五月吳王使鄱陽太守周魴密求山中舊族名帥為北方所名者令譎挑揚州牧曹休魴曰民帥小醜不足仗任事或漏泄不能致休乞遣親人齎箋以誘休言被譴懼欲以郡降北求兵應接吳主許之時頻有郎官詣魴詰問諸事魴因詣郡門下下髮謝休聞之率步騎十萬向皖以應魴秋八月吳主至皖以陸遜為大都督假黃鉞親執鞭以見之休與陸遜戰於石亭遜自為中部令朱桓全琮為左右翼三道俱進衝休伏兵因驅走之追亡逐北徑至夾石斬獲萬餘牛馬騾驢車乘萬兩軍資器械略盡臣燾曰圖天下之大事必有取天下之定計勢雖有強弱兵雖有利鈍而其取之之計則一定而不易越取夫差是威之而已漢取項籍是困之而已孫權於吳卑身驕敵則如越而不能久使人備已則如秦而不能攻計非困敵無以取之矣聞之高祖之取楚也堅守關中伺楚之出挑成皋戰滎陽役項羽而使之返擊蓋自定關中之後因其擊齊也而入彭城羽既從魯還鬭雎水因其擊彭越也而入成皋羽則自下邳還拔滎陽因其擊梁也而復入成皋羽則自梁還戰廣武高祖三以役楚而三敗然終不以敗之故因其東歸復為固陵之會而羽還敗於垓下一戰擒之楚漢之爭不過三返兵罷力屈為漢所并則高祖之定計固以困而取之也孫權據長江以致魏自曹公赤壁之後一軍合淝再向濡須而魏文亦一再幸廣陵臨江而旋撤軍而返者屢矣孫權又以任子激魏而致歸羡之師以周魴詐魏而誘皖口之役固有意乎困之也臣嘗謂高帝之謀困項羽於返擊而孫權之計役魏人以來攻皆兵法逸能勞之安能動之之䇿也孫權晚節倦於用兵不為垓下之舉以成高帝混一之功故臣因周魴之事而論江南可以困敵之計孫權既即皇帝位議者咸以權利在鼎足不能并力且志望已滿無上岸之情三年夏四月丙申吳王即皇帝位大赦改元黃龍吳主使以並尊二帝之議往告于漢漢人以為交之無益名體弗順宜顯明正義絶其盟好丞相亮曰權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絶讎我必深更當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯睦未可一朝定也議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢臣燾曰集大事者必有大志取天下大事也而臣主志卑則始謀而未發也其氣必怯終久而無成其意必倦怯於始倦於終而欲一天下成大事難矣高帝西遷漢中形勢僅可自守宜若絶混一之望矣而居常鬱鬱不忘欲東則其所負者乃帝王之意與項羽衣錦之量豈不相逺哉豈待垓下勝負決天下定大事乎孫權據長江之巨險藉再世之遺業形勝萬萬於漢中矣而又周瑜欲為之吞梁益朱桓欲為之割江南徐盛欲為之并許洛臣下不可謂無其人而孫權志望滿於鼎足據形勝之地不為進取之計徒限江自守而已雖時出師北不踰合淝西不過襄陽以示武警敵無復中原之意蓋人之立志止此則不可以志望之外而責之也諸葛亮謂其智力不侔非徒失言亦見所存之淺矣攻魏新城黃龍元年吳主出兵欲圍新城以其逺水積二十餘日不敢下船滿寵請諸將曰孫權得吾新城必於其衆中有自大之言今大舉來欲要一切之功雖不敢至必當上岸耀兵以示有餘乃潛遣步騎六千伏淝水隱處以待之吳主果上岸耀兵寵伏軍卒起擊之斬首數百或有赴水死者又二年五月吳主入居巢湖口向合淝圍新城衆號十萬秋七月壬寅帝御龍舟東征滿寵募壯士焚吳攻具射殺吳主之弟子泰吳主遂遁孫韶陸遜亦退臣燾曰攻則欲致敵守則欲逺冦致敵於近而其戰方力禦冦於逺而其心方固高祖之所守者關中也而嘗戰於京索之間武侯之所守者漢中也而嘗爭於秦渭之上蓋所以嚴扃鐍重藩籬以固其根本而使敵不知所以攻惟秦守嶢關蜀守劒閣敵人取之易如反掌蓋開門延盜使得志於堂奧之間然後起而禦之亦難為力矣孫權於吳南守建業而自與滿寵轉戰於新城之下西守江陵而周瑜陸遜無日不向襄陽新城襄陽者魏之衝而江陵建業之蔽也扼敵於逺使近之所守者得以休息於內而時佐其急以是而守則敵不知所攻矣後世常怪孫權保固江東以抗二大敵宜若有餘噫孰謂孫權用高祖武侯之守而有嶢關劒閣之失乎商札以曹氏政衰勸孫權遣諸葛瑾等攻壽春陸遜等攻襄陽又命益州軍于隴右權不從魏邵陵厲公正始二年春吳人將伐魏零陵太守商札言於吳主曰曹氏虎爭之際而幼童涖事宜西命益州軍于隴右授諸葛瑾朱然大衆直指襄陽陸遜朱桓别征壽春大駕入淮陽厯青襄陽壽春困於受敵長安以西務禦蜀軍許洛之衆藝必分離犄角並進一軍敗績則三軍離心便當乘勝以定華夏吳主不能用臣燾曰自古用兵時未至而發則無成功時至而不發則失機會英雄不違時茍惟不發發則必中其會三國之際太祖昭烈與吳鼎峙志均力敵孫權能自守以待可攻固得其時矣文帝以降魏氏之君機謀幹略皆非孫權敵而中原之變不起於內則起於外此魏氏可乘之機而孫權當時之會也明帝太和間諸葛亮以重兵撼關中而石亭之役曹休敗績方是時魏兵西挂於蜀東激於吳東西牽制首尾不掉此其外禍有可乘者一也使其因陸遜之勝用朱桓之言徑斷夾石長驅襄陽割淮南以撼許洛蜀兵日益久矣兵日益進未必不如其志而撫機不發使魏軍得振而吳不可制邵陵厲公以幼童當大敵而又曹爽廢立政事紛亂司馬懿亦營立家門未遑外事其內患有可乘者二也使其移全琮之兵從商札之請用吳連蜀以致大舉一軍麾之於長安一軍困之於壽春一軍格之於襄陽使敵備多而力分然後校於東駭於西震於南傾於北使之一舉而倣徨四顧皆纍其憂則雖未至許洛天下事定矣而循前輕舉屢出屢返吳兵雖勞而魏不加損嗟夫使吳卒不能定中原而曹氏終為鼎足之雄者由孫權能不違時而不能不失時也商札所謂民疲威消時往力竭足針其膏肓矣六朝通鑑博議卷二
